input {
  http {
    port => 5044
    codec => json
  }
}

filter {
  if [message] =~ "^\s*\{.*\}\s*$" {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }

  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  if ![serviceName] {
    mutate {
      add_field => { "serviceName" => "unknown-service" }
    }
  }

  if ![logType] {
    mutate {
      add_field => { "logType" => "application" }
    }
  }

  mutate {
    add_field => {
      "[observability][phase]" => "6.1"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "microservices-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
