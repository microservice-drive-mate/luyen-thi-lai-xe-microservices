global:
  resolve_timeout: 5m

route:
  receiver: local-webhook
  group_by:
    - alertname
    - service
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: local-webhook
      repeat_interval: 30m

receivers:
  - name: local-webhook
    webhook_configs:
      - url: http://host.docker.internal:9099/alertmanager
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - service
