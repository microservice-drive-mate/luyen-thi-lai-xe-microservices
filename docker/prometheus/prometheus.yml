global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: microservices
    metrics_path: /metrics
    static_configs:
      - targets:
          - identity-service:3000
          - user-service:3000
          - exam-service:3000
          - course-service:3000
          - question-service:3000
          - notification-service:3000
          - analytics-service:3000
          - simulation-service:3000
          - media-service:3000
          - audit-service:3000
        labels:
          environment: docker
