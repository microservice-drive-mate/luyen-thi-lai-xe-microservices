global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets:
          - rabbitmq:15692
        labels:
          environment: development-local

  - job_name: dora
    metrics_path: /metrics
    static_configs:
      - targets:
          - dora-metrics-exporter:9100
        labels:
          environment: development-local

  - job_name: microservices-local
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3001
          - host.docker.internal:3002
          - host.docker.internal:3003
          - host.docker.internal:3004
          - host.docker.internal:3005
          - host.docker.internal:3006
          - host.docker.internal:3007
          - host.docker.internal:3008
          - host.docker.internal:3009
          - host.docker.internal:3010
          - host.docker.internal:3011
        labels:
          environment: development-local
