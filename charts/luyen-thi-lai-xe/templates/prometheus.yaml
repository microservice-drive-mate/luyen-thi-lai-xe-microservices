{{- if and .Values.observability.enabled .Values.observability.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lttl.fullname" . }}-prometheus
  labels:
    {{- include "lttl.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules.yml

    {{- if .Values.observability.alertmanager.enabled }}
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - {{ include "lttl.fullname" . }}-alertmanager:9093
    {{- end }}

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090
            labels:
              environment: {{ .Values.global.nodeEnv | quote }}

      - job_name: rabbitmq
        metrics_path: /metrics
        static_configs:
          - targets:
              - {{ include "lttl.fullname" . }}-rabbitmq:15692
            labels:
              environment: {{ .Values.global.nodeEnv | quote }}

      - job_name: microservices
        metrics_path: /metrics
        static_configs:
          - targets:
{{- range .Values.services }}
              - {{ include "lttl.componentName" (dict "root" $ "name" .name) }}:3000
{{- end }}
            labels:
              environment: {{ .Values.global.nodeEnv | quote }}
  rules.yml: |
    groups:
      - name: microservices-slo
        rules:
          - alert: ServiceMetricsEndpointDown
            expr: up{job="microservices"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: Service metrics endpoint is down
              description: Prometheus cannot scrape {{ "{{" }} $labels.instance {{ "}}" }} for more than 2 minutes.

          - alert: HighHttp5xxRate
            expr: |
              sum by (service) (rate(http_requests_total{status_class="5xx"}[5m]))
                /
              clamp_min(sum by (service) (rate(http_requests_total[5m])), 1)
                > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: High HTTP 5xx rate
              description: "{{ "{{" }} $labels.service {{ "}}" }} has more than 5% HTTP 5xx responses for 5 minutes."

          - alert: HighHttpLatencyP95
            expr: |
              histogram_quantile(
                0.95,
                sum by (service, le) (rate(http_request_duration_seconds_bucket[5m]))
              ) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: High p95 HTTP latency
              description: "{{ "{{" }} $labels.service {{ "}}" }} p95 latency is above 1 second for 5 minutes."

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lttl.fullname" . }}-prometheus
  labels:
    {{- include "lttl.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9090
      targetPort: http
  selector:
    {{- include "lttl.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "lttl.fullname" . }}-prometheus
  labels:
    {{- include "lttl.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  serviceName: {{ include "lttl.fullname" . }}-prometheus
  replicas: 1
  selector:
    matchLabels:
      {{- include "lttl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: prometheus
  template:
    metadata:
      labels:
        {{- include "lttl.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: prometheus
    spec:
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 65534:65534 /prometheus"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: prometheus-data
              mountPath: /prometheus
      containers:
        - name: prometheus
          image: {{ .Values.observability.prometheus.image | quote }}
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.observability.prometheus.retention }}
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.observability.prometheus.resources | nindent 12 }}
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-data
              mountPath: /prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: {{ include "lttl.fullname" . }}-prometheus
  volumeClaimTemplates:
    - metadata:
        name: prometheus-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.global.storageClassName | quote }}
        resources:
          requests:
            storage: {{ .Values.observability.prometheus.storage | quote }}
{{- end }}
