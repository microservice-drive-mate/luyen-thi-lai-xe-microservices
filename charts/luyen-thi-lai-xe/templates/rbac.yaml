apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lttl.serviceAccountName" . }}
  labels:
    {{- include "lttl.labels" . | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "lttl.serviceAccountName" . }}
  labels:
    {{- include "lttl.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "lttl.serviceAccountName" . }}
  labels:
    {{- include "lttl.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "lttl.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "lttl.serviceAccountName" . }}
