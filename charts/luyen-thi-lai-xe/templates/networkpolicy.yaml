    {{- include "lttl.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "lttl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "lttl.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: app
        - podSelector:
            matchLabels:
              {{- include "lttl.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: keycloak
        - podSelector:
            matchLabels:
              {{- include "lttl.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: migration
        - podSelector:
            matchLabels:
              {{- include "lttl.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: seed
      ports:
        - port: 5432

