    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "lttl.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: prometheus
      ports:
        - port: 3000
        - port: 9090
        - port: 15692

