              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              {{- include "lttl.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: app
        - podSelector:
            matchLabels:
              {{- include "lttl.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: kong
      ports:
