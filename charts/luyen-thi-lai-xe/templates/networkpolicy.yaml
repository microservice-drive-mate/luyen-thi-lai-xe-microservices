kind: NetworkPolicy
metadata:
  name: {{ include "lttl.fullname" . }}-allow-consul
  labels:
    {{- include "lttl.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "lttl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: consul
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "lttl.selectorLabels" . | nindent 14 }}
      ports:
        - port: 8500

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
