{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lttl.fullname" . }}-default-deny
  labels:
    {{- include "lttl.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lttl.fullname" . }}-allow-kong-from-ingress
  labels:
    {{- include "lttl.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "lttl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: kong
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8000
        - port: 8443

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lttl.fullname" . }}-allow-apps-from-kong
  labels:
    {{- include "lttl.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "lttl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "lttl.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: kong
      ports:
        - port: 3000

---
# Inter-service HTTP calls (e.g. exam-service → question-service)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lttl.fullname" . }}-allow-apps-from-apps
  labels:
    {{- include "lttl.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "lttl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "lttl.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: app
      ports:
        - port: 3000

---
apiVersion: networking.k8s.io/v1
