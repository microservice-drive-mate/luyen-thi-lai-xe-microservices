  labels:
    {{- include "lttl.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "lttl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: keycloak
  policyTypes:
    - Ingress
  ingress:
