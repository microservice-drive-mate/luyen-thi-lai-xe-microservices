{{- if .Values.tracing.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lttl.fullname" . }}-jaeger
  labels:
    {{- include "lttl.labels" . | nindent 4 }}
    app.kubernetes.io/component: tracing
spec:
  type: ClusterIP
  ports:
    - name: ui
      port: 16686
      targetPort: ui
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: zipkin
      port: 9411
      targetPort: zipkin
  selector:
    {{- include "lttl.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: tracing

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lttl.fullname" . }}-jaeger
  labels:
    {{- include "lttl.labels" . | nindent 4 }}
    app.kubernetes.io/component: tracing
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "lttl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tracing
  template:
    metadata:
      labels:
        {{- include "lttl.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tracing
    spec:
      containers:
        - name: jaeger
          image: {{ .Values.tracing.jaeger.image | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          ports:
            - name: ui
              containerPort: 16686
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: zipkin
              containerPort: 9411
          readinessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.tracing.jaeger.resources | nindent 12 }}
{{- end }}
