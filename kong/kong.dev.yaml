_format_version: "3.0"
_transform: true

# Kong config cho hybrid dev mode
# Services chạy local, Kong trong Docker dùng host.docker.internal để reach chúng

services:
  - name: identity-service
    url: http://host.docker.internal:3001
    routes:
      - name: identity-route
        paths:
          - /auth
        strip_path: true
      - name: identity-admin-route
        paths:
          - /admin
        strip_path: false
      - name: identity-swagger-route
        paths:
          - /identity-service
        strip_path: true

  - name: user-service
    url: http://host.docker.internal:3002
    routes:
      - name: user-route
        paths:
          - /users
        strip_path: false
      - name: user-swagger-route
        paths:
          - /user-service
        strip_path: true

  - name: exam-service
    url: http://host.docker.internal:3003
    routes:
      - name: exam-route
        paths:
          - /exams
        strip_path: false
      - name: exam-swagger-route
        paths:
          - /exam-service
        strip_path: true

  - name: course-service
    url: http://host.docker.internal:3004
    routes:
      - name: course-route
        paths:
          - /courses
          - /enrollments
        strip_path: false
      - name: course-swagger-route
        paths:
          - /course-service
        strip_path: true

  - name: question-service
    url: http://host.docker.internal:3005
    routes:
      - name: question-route
        paths:
          - /questions
        strip_path: false
      - name: question-swagger-route
        paths:
          - /question-service
        strip_path: true

  - name: notification-service
    url: http://host.docker.internal:3006
    routes:
      - name: notification-route
        paths:
          - /notifications
        strip_path: false
      - name: notification-swagger-route
        paths:
          - /notification-service
        strip_path: true

  - name: analytics-service
    url: http://host.docker.internal:3007
    routes:
      - name: analytics-route
        paths:
          - /analytics
        strip_path: false
      - name: analytics-swagger-route
        paths:
          - /analytics-service
        strip_path: true

  - name: simulation-service
    url: http://host.docker.internal:3008
    routes:
      - name: simulation-route
        paths:
          - /simulations
        strip_path: false
      - name: simulation-swagger-route
        paths:
          - /simulation-service
        strip_path: true

  - name: media-service
    url: http://host.docker.internal:3010
    routes:
      - name: media-route
        paths:
          - /media
        strip_path: false
      - name: media-swagger-route
        paths:
          - /media-service
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - http://localhost:5173
        - http://127.0.0.1:3000
        - http://127.0.0.1:5173
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin
        - X-Requested-With
        - x-user-id
        - x-user-role
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600
  - name: rate-limiting
    config:
      second: 100
      hour: 10000
      policy: local
