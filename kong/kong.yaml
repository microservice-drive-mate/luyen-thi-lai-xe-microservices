_format_version: "3.0"
_transform: true

services:
  # 1. Quản lý định danh và xác thực
  - name: identity-service
    url: http://identity-service:3000
    routes:
      - name: identity-route
        paths:
          - /auth
        strip_path: true
      - name: identity-admin-route
        paths:
          - /admin
        strip_path: false
      - name: identity-swagger-route
        paths:
          - /identity-service
        strip_path: true

  # 2. Quản lý thông tin người dùng (Profile, điểm số...)
  - name: user-service
    url: http://user-service:3000
    routes:
      - name: user-route
        paths:
          - /users
        strip_path: false
      - name: user-admin-route
        paths:
          - /admin/users
        strip_path: false
      - name: user-swagger-route
        paths:
          - /user-service
        strip_path: true

  # 3. Quản lý các kỳ thi và kết quả sát hạch
  - name: exam-service
    url: http://exam-service:3000
    routes:
      - name: exam-route
        paths:
          - /exams
        strip_path: false
      - name: exam-admin-route
        paths:
          - /admin/exams
        strip_path: false
      - name: exam-swagger-route
        paths:
          - /exam-service
        strip_path: true

  # 4. Quản lý ngân hàng câu hỏi (Lý thuyết, biển báo...)
  - name: question-service
    url: http://question-service:3000
    routes:
      - name: question-admin-route
        paths:
          - /admin/questions
        strip_path: false
      - name: question-swagger-route
        paths:
          - /question-service
        strip_path: true

  # 5. Quản lý khóa học và tài liệu ôn tập
  - name: course-service
    url: http://course-service:3000
    routes:
      - name: course-route
        paths:
          - /courses
          - /enrollments
        strip_path: false
      - name: course-admin-route
        paths:
          - /admin/courses
        strip_path: false
      - name: course-swagger-route
        paths:
          - /course-service
        strip_path: true

  # 6. Dịch vụ thông báo (Email, SMS, App Push)
  - name: notification-service
    url: http://notification-service:3000
    routes:
      - name: notification-route
        paths:
          - /notifications
        strip_path: false
      - name: notification-swagger-route
        paths:
          - /notification-service
        strip_path: true

  # 7. Thống kê và báo cáo tiến độ luyện tập
  - name: analytics-service
    url: http://analytics-service:3000
    routes:
      - name: analytics-route
        paths:
          - /analytics
        strip_path: false
      - name: analytics-swagger-route
        paths:
          - /analytics-service
        strip_path: true

  # 8. Mô phỏng các tình huống thực tế (120 tình huống)
  - name: simulation-service
    url: http://simulation-service:3000
    routes:
      - name: simulation-route
        paths:
          - /simulation
        strip_path: false
      - name: simulation-swagger-route
        paths:
          - /simulation-service
        strip_path: true

  # 9. Lưu trữ media và file (Cloudflare R2)
  - name: media-service
    url: http://media-service:3000
    routes:
      - name: media-route
        paths:
          - /media
        strip_path: false
      - name: media-admin-route
        paths:
          - /admin/media
        strip_path: false
      - name: media-swagger-route
        paths:
          - /media-service
        strip_path: true

  # 10. Centralized security audit trail
  - name: audit-service
    url: http://audit-service:3000
    routes:
      - name: audit-admin-route
        paths:
          - /admin/audit-logs
        strip_path: false
      - name: audit-swagger-route
        paths:
          - /audit-service
        strip_path: true
# ========================================================
# Cấu hình Plugins chung (Optional)
# ========================================================
plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - http://localhost:3001
        - http://localhost:3009
        - http://localhost:4173
        - http://localhost:5173
        - http://localhost:5174
        - http://localhost:4200
        - http://127.0.0.1:3000
        - http://127.0.0.1:3001
        - http://127.0.0.1:3009
        - http://127.0.0.1:4173
        - http://127.0.0.1:5173
        - http://127.0.0.1:5174
        - http://127.0.0.1:4200
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin
        - X-Requested-With
        - x-correlation-id
        - x-user-id
        - x-user-role
      exposed_headers:
        - Authorization
        - x-correlation-id
      credentials: true
      max_age: 3600
  - name: correlation-id
    config:
      header_name: x-correlation-id
      generator: uuid#counter
      echo_downstream: true
  - name: zipkin
    config:
      http_endpoint: http://jaeger:9411/api/v2/spans
      sample_ratio: 1
  - name: rate-limiting
    config:
      second: 100
      hour: 1000
      policy: local
