      - KEYCLOAK_CLIENT_ID=nestjs-backend
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-change-me}
      - STORAGE_ACCOUNT_NAME=${STORAGE_ACCOUNT_NAME:-}
      - STORAGE_ACCOUNT_KEY=${STORAGE_ACCOUNT_KEY:-}
      - STORAGE_CONTAINER_NAME=${STORAGE_CONTAINER_NAME:-media}
      - STORAGE_PRESIGNED_URL_EXPIRY=${STORAGE_PRESIGNED_URL_EXPIRY:-3600}
      - LOGSTASH_HOST=logstash
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - OTEL_TRACING_ENABLED=${OTEL_TRACING_ENABLED:-true}
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://jaeger:4318/v1/traces
      - OTEL_PROPAGATORS=tracecontext,baggage
    ports:
      - "3010:3000"
    restart: unless-stopped
    depends_on:
      db-media:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  audit-service:
    build:
      context: .
      dockerfile: ./Dockerfile.service
      args:
        SERVICE_NAME: audit-service
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db-audit:5432/audit_db
      - CONSUL_URL=http://consul:8500
      - LOGSTASH_HOST=logstash
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=luyen-thi-lai-xe-realm
      - KEYCLOAK_CLIENT_ID=nestjs-backend
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-change-me}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - OTEL_TRACING_ENABLED=${OTEL_TRACING_ENABLED:-true}
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://jaeger:4318/v1/traces
      - OTEL_PROPAGATORS=tracecontext,baggage
    ports:
      - "3011:3000"
    restart: unless-stopped
    depends_on:
      db-audit:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ========================================================
  # 4. API GATEWAY (KONG)
  # ========================================================
  kong:
    image: kong:latest
    user: "root"
    volumes:
      - ./kong:/usr/local/kong/declarative
    environment:
      KONG_DATABASE: "off" # Chế độ DB-less
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - "8000:8000" # Cổng gọi API chính
      - "8001:8001" # Cổng Admin API để kiểm tra cấu hình
    depends_on:
      - jaeger

  # ========================================================
  # 5. OBSERVABILITY (ELK Stack)
  # ========================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.3
    volumes:
      - ./docker/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044" # Cổng TCP nhận log
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.3
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  jaeger:
    image: jaegertracing/jaeger:2.5.0
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "9411:9411"
    restart: unless-stopped

  dora-metrics-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --collector.disable-defaults
      - --collector.textfile
      - --collector.textfile.directory=/textfile
      - --web.listen-address=:9100
    volumes:
      - ./reports/dora:/textfile:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    depends_on:
      - identity-service
      - user-service
      - exam-service
      - course-service
      - question-service
      - notification-service
      - analytics-service
      - simulation-service
      - media-service
      - audit-service
      - alertmanager
      - dora-metrics-exporter

  alertmanager:
    image: prom/alertmanager:v0.27.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "30000:3000"
    depends_on:
      - prometheus
  # ========================================================
  # 6. Keycloak 
  # ========================================================
# Database riêng cho Keycloak
  db-keycloak:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak_db}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-password}
    volumes:
      - db_keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak_db}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  # Keycloak Service
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-keycloak:5432/${KEYCLOAK_DB_NAME:-keycloak_db}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-password}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Cấu hình để chạy sau Gateway hoặc Proxy
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      db-keycloak:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  keycloak-smtp-config:
    image: quay.io/keycloak/keycloak:24.0
    volumes:
      - ./docker/keycloak/configure-smtp.sh:/opt/keycloak/configure-smtp.sh:ro
    entrypoint: ["/bin/sh", "/opt/keycloak/configure-smtp.sh"]
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: luyen-thi-lai-xe-realm
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_SMTP_HOST: ${KEYCLOAK_SMTP_HOST:-mailpit}
      KEYCLOAK_SMTP_PORT: ${KEYCLOAK_SMTP_PORT:-1025}
      KEYCLOAK_SMTP_FROM: ${KEYCLOAK_SMTP_FROM:-no-reply@luyen-thi-lai-xe.local}
      KEYCLOAK_SMTP_FROM_DISPLAY_NAME: ${KEYCLOAK_SMTP_FROM_DISPLAY_NAME:-Luyen Thi Lai Xe}
      KEYCLOAK_SMTP_REPLY_TO: ${KEYCLOAK_SMTP_REPLY_TO:-no-reply@luyen-thi-lai-xe.local}
      KEYCLOAK_SMTP_REPLY_TO_DISPLAY_NAME: ${KEYCLOAK_SMTP_REPLY_TO_DISPLAY_NAME:-Luyen Thi Lai Xe}
      KEYCLOAK_SMTP_AUTH: ${KEYCLOAK_SMTP_AUTH:-false}
      KEYCLOAK_SMTP_USER: ${KEYCLOAK_SMTP_USER:-}
      KEYCLOAK_SMTP_PASSWORD: ${KEYCLOAK_SMTP_PASSWORD:-}
      KEYCLOAK_SMTP_SSL: ${KEYCLOAK_SMTP_SSL:-false}
      KEYCLOAK_SMTP_STARTTLS: ${KEYCLOAK_SMTP_STARTTLS:-false}
    depends_on:
      keycloak:
        condition: service_healthy
      mailpit:
        condition: service_started
    restart: "no"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  # ========================================================
  # 6. TOKEN BLACKLIST CACHE (Redis)
  # ========================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  db_identity_data:
  db_user_data:
  db_exam_data:
  db_course_data:
  db_question_data:
  db_notification_data:
  db_analytics_data:
  db_simulation_data:
  db_media_data:
  db_audit_data:
  consul_data:
  rabbitmq_data:
  elasticsearch_data:
  db_keycloak_data:
  redis_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
