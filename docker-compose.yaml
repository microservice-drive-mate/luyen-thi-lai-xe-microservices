  db-audit:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: audit_db
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5441:5432"
    volumes:
      - db_audit_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d audit_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  # ========================================================
  # 2. MESSAGE BROKER (Giao tiếp liên dịch vụ)
  # ========================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    hostname: rabbitmq
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      "export PATH=/opt/rabbitmq/sbin:/opt/erlang/bin:/opt/openssl/bin:$$PATH &&
      mkdir -p /var/lib/rabbitmq &&
      printf '%s' \"$$RABBITMQ_ERLANG_COOKIE\" > /var/lib/rabbitmq/.erlang.cookie &&
      chown -R rabbitmq:rabbitmq /var/lib/rabbitmq &&
      chmod 700 /var/lib/rabbitmq &&
      chmod 600 /var/lib/rabbitmq/.erlang.cookie &&
      exec docker-entrypoint.sh /opt/rabbitmq/sbin/rabbitmq-server"
    environment:
      RABBITMQ_NODENAME: rabbit@rabbitmq
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-luyen-thi-lai-xe-rabbitmq-cookie}
    ports:
      - "5672:5672"   # Port cho ứng dụng kết nối
      - "15672:15672" # Port cho giao diện quản lý (Web UI)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
  # ========================================================
  # 2.5 CONFIG SERVER (CONSUL)
  # ========================================================
  consul:
    image: hashicorp/consul:1.19
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    ports:
      - "8500:8500"   # HTTP API & UI
      - "8600:8600"   # DNS
      - "8600:8600/udp"
    environment:
      CONSUL_BIND_INTERFACE: eth0
    volumes:
      - consul_data:/consul/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Sidecar chạy init.sh sau khi Consul healthy để seed cấu hình vào KV Store
  consul-init:
    image: curlimages/curl:latest
    volumes:
      - ./docker/consul/init.sh:/consul/init.sh:ro
    environment:
      CONSUL_URL: http://consul:8500
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
      KEYCLOAK_TIMEOUT_MS: ${KEYCLOAK_TIMEOUT_MS:-10000}
      STORAGE_ACCOUNT_NAME: ${STORAGE_ACCOUNT_NAME:-}
      STORAGE_ACCOUNT_KEY: ${STORAGE_ACCOUNT_KEY:-}
      STORAGE_CONTAINER_NAME: ${STORAGE_CONTAINER_NAME:-media}
      STORAGE_PRESIGNED_URL_EXPIRY: ${STORAGE_PRESIGNED_URL_EXPIRY:-3600}
      GATEWAY_PUBLIC_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8000}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      KONG_CORS_ORIGINS: ${KONG_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
    depends_on:
      consul:
        condition: service_healthy
    command: sh /consul/init.sh
    restart: "no"

  # ========================================================
  # 3. CÁC MICROSERVICES (NestJS)
  # ========================================================

  identity-service:
    build:
      context: .
      dockerfile: ./Dockerfile.service
      args:
        SERVICE_NAME: identity-service
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db-identity:5432/identity_db
      - CONSUL_URL=http://consul:8500
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=luyen-thi-lai-xe-realm
      - KEYCLOAK_CLIENT_ID=nestjs-backend
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-change-me}
      - LOGSTASH_HOST=logstash
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - OTEL_TRACING_ENABLED=${OTEL_TRACING_ENABLED:-true}
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://jaeger:4318/v1/traces
      - OTEL_PROPAGATORS=tracecontext,baggage
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on:
      db-identity:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

