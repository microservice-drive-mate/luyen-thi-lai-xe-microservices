services:
  # ========================================================
  # 1. CÁC CƠ SỞ DỮ LIỆU (Mỗi Service một DB riêng)
  # ========================================================

  # Database cho Identity Service (Quản lý tài khoản, login)
  db-identity:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db_identity_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d identity_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  # Database cho User Service (Quản lý profile, thông tin người dùng)
  db-user:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - db_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  # Database cho Exam Service (Quản lý các kỳ thi, kết quả thi)
  db-exam:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: exam_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - db_exam_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d exam_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  # Database cho Course Service (Quản lý khóa học, bài học)
  db-course:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: course_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    volumes:
      - db_course_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d course_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  # Database cho Question Service (Quản lý ngân hàng câu hỏi)
  db-question:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: question_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5436:5432"
    volumes:
      - db_question_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d question_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  # Database cho Notification Service (Lưu lịch sử thông báo)
  db-notification:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5437:5432"
    volumes:
      - db_notification_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  # Database cho Analytics Service (Thống kê, báo cáo dữ liệu)
  db-analytics:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: analytics_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5438:5432"
    volumes:
      - db_analytics_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d analytics_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  # Database cho Simulation Service (Mô phỏng các tình huống lái xe)
  db-simulation:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: simulation_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5439:5432"
    volumes:
      - db_simulation_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d simulation_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  # Database cho Media Service (Metadata của file lưu trên R2)
  db-media:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: media_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5440:5432"
    volumes:
      - db_media_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d media_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  # ========================================================
  # 2. MESSAGE BROKER (Giao tiếp liên dịch vụ)
  # ========================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    hostname: rabbitmq
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      "export PATH=/opt/rabbitmq/sbin:/opt/erlang/bin:/opt/openssl/bin:$$PATH &&
      mkdir -p /var/lib/rabbitmq &&
      printf '%s' \"$$RABBITMQ_ERLANG_COOKIE\" > /var/lib/rabbitmq/.erlang.cookie &&
      chown -R rabbitmq:rabbitmq /var/lib/rabbitmq &&
      chmod 700 /var/lib/rabbitmq &&
      chmod 600 /var/lib/rabbitmq/.erlang.cookie &&
      exec docker-entrypoint.sh /opt/rabbitmq/sbin/rabbitmq-server"
    environment:
      RABBITMQ_NODENAME: rabbit@rabbitmq
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_ERLANG_COOKIE: luyen-thi-lai-xe-rabbitmq-cookie
    ports:
      - "5672:5672"   # Port cho ứng dụng kết nối
      - "15672:15672" # Port cho giao diện quản lý (Web UI)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
  # ========================================================
  # 2.5 CONFIG SERVER (CONSUL)
  # ========================================================
  consul:
    image: hashicorp/consul:1.19
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    ports:
      - "8500:8500"   # HTTP API & UI
      - "8600:8600"   # DNS
      - "8600:8600/udp"
    environment:
      CONSUL_BIND_INTERFACE: eth0
    volumes:
      - consul_data:/consul/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Sidecar chạy init.sh sau khi Consul healthy để seed cấu hình vào KV Store
  consul-init:
    image: curlimages/curl:latest
    volumes:
      - ./docker/consul/init.sh:/consul/init.sh:ro
    environment:
      CONSUL_URL: http://consul:8500
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
      STORAGE_ACCOUNT_NAME: ${STORAGE_ACCOUNT_NAME:-}
      STORAGE_ACCOUNT_KEY: ${STORAGE_ACCOUNT_KEY:-}
      STORAGE_CONTAINER_NAME: ${STORAGE_CONTAINER_NAME:-media}
      STORAGE_PRESIGNED_URL_EXPIRY: ${STORAGE_PRESIGNED_URL_EXPIRY:-3600}
    depends_on:
      consul:
        condition: service_healthy
    command: sh /consul/init.sh
    restart: "no"

  # ========================================================
  # 3. CÁC MICROSERVICES (NestJS)
  # ========================================================

  identity-service:
    build:
      context: .
      dockerfile: ./apps/identity-service/Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@db-identity:5432/identity_db
      - CONSUL_URL=http://consul:8500
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - REDIS_URL=redis://redis:6379
      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=luyen-thi-lai-xe-realm
      - KEYCLOAK_CLIENT_ID=nestjs-backend
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-change-me}
      - LOGSTASH_HOST=logstash
    ports:
      - "3001:3000"
    depends_on:
      db-identity:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: ./apps/user-service/Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@db-user:5432/user_db
      - CONSUL_URL=http://consul:8500
      - LOGSTASH_HOST=logstash
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=luyen-thi-lai-xe-realm
      - KEYCLOAK_CLIENT_ID=nestjs-backend
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-change-me}
      - LOGSTASH_HOST=logstash
    ports:
      - "3002:3000"
    depends_on:
      db-user:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  exam-service:
    build:
      context: .
      dockerfile: ./apps/exam-service/Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@db-exam:5432/exam_db
      - CONSUL_URL=http://consul:8500
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=luyen-thi-lai-xe-realm
      - KEYCLOAK_CLIENT_ID=nestjs-backend
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-change-me}
      - QUESTION_SERVICE_URL=http://question-service:3000
      - USER_SERVICE_URL=http://user-service:3000
      - LOGSTASH_HOST=logstash
    ports:
      - "3003:3000"
    depends_on:
      db-exam:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  course-service:
    build:
      context: .
      dockerfile: ./apps/course-service/Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@db-course:5432/course_db
      - CONSUL_URL=http://consul:8500
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=luyen-thi-lai-xe-realm
      - KEYCLOAK_CLIENT_ID=nestjs-backend
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-change-me}
      - LOGSTASH_HOST=logstash
    ports:
      - "3004:3000"
    depends_on:
      db-course:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  question-service:
    build:
      context: .
      dockerfile: ./apps/question-service/Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@db-question:5432/question_db
      - CONSUL_URL=http://consul:8500
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=luyen-thi-lai-xe-realm
      - KEYCLOAK_CLIENT_ID=nestjs-backend
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-change-me}
      - LOGSTASH_HOST=logstash
    ports:
      - "3005:3000"
    depends_on:
      db-question:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: ./apps/notification-service/Dockerfile
    environment:
      - CONSUL_URL=http://consul:8500
      - LOGSTASH_HOST=logstash
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=luyen-thi-lai-xe-realm
      - KEYCLOAK_CLIENT_ID=nestjs-backend
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-change-me}
    ports:
      - "3006:3000"
    depends_on:
      db-notification:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  analytics-service:
    build:
      context: .
      dockerfile: ./apps/analytics-service/Dockerfile
    environment:
      - CONSUL_URL=http://consul:8500
      - LOGSTASH_HOST=logstash
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - REDIS_URL=redis://redis:6379
      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=luyen-thi-lai-xe-realm
      - KEYCLOAK_CLIENT_ID=nestjs-backend
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-change-me}
    ports:
      - "3007:3000"
    depends_on:
      db-analytics:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
  simulation-service:
    build:
      context: .
      dockerfile: ./apps/simulation-service/Dockerfile
    environment:
      - CONSUL_URL=http://consul:8500
      - LOGSTASH_HOST=logstash
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - REDIS_URL=redis://redis:6379
      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=luyen-thi-lai-xe-realm
      - KEYCLOAK_CLIENT_ID=nestjs-backend
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-change-me}
    ports:
      - "3008:3000"
    depends_on:
      db-simulation:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  media-service:
    build:
      context: .
      dockerfile: ./apps/media-service/Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@db-media:5432/media_db
      - CONSUL_URL=http://consul:8500
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=luyen-thi-lai-xe-realm
      - KEYCLOAK_CLIENT_ID=nestjs-backend
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-change-me}
      - STORAGE_ACCOUNT_NAME=${STORAGE_ACCOUNT_NAME:-}
      - STORAGE_ACCOUNT_KEY=${STORAGE_ACCOUNT_KEY:-}
      - STORAGE_CONTAINER_NAME=${STORAGE_CONTAINER_NAME:-media}
      - STORAGE_PRESIGNED_URL_EXPIRY=${STORAGE_PRESIGNED_URL_EXPIRY:-3600}
      - LOGSTASH_HOST=logstash
    ports:
      - "3010:3000"
    depends_on:
      db-media:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  # ========================================================
  # 4. API GATEWAY (KONG)
  # ========================================================
  kong:
    image: kong:latest
    user: "root"
    volumes:
      - ./kong:/usr/local/kong/declarative
    environment:
      KONG_DATABASE: "off" # Chế độ DB-less
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - "8000:8000" # Cổng gọi API chính
      - "8001:8001" # Cổng Admin API để kiểm tra cấu hình

  # ========================================================
  # 5. OBSERVABILITY (ELK Stack)
  # ========================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.3
    volumes:
      - ./docker/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044" # Cổng TCP nhận log
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.3
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
  # ========================================================
  # 6. Keycloak 
  # ========================================================
# Database riêng cho Keycloak
  db-keycloak:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    volumes:
      - db_keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  # Keycloak Service
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-keycloak:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Cấu hình để chạy sau Gateway hoặc Proxy
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      db-keycloak:
        condition: service_healthy
      mailpit:
        condition: service_started

  keycloak-smtp-config:
    image: quay.io/keycloak/keycloak:24.0
    volumes:
      - ./docker/keycloak/configure-smtp.sh:/opt/keycloak/configure-smtp.sh:ro
    entrypoint: ["/bin/sh", "/opt/keycloak/configure-smtp.sh"]
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: luyen-thi-lai-xe-realm
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_SMTP_HOST: ${KEYCLOAK_SMTP_HOST:-mailpit}
      KEYCLOAK_SMTP_PORT: ${KEYCLOAK_SMTP_PORT:-1025}
      KEYCLOAK_SMTP_FROM: ${KEYCLOAK_SMTP_FROM:-no-reply@luyen-thi-lai-xe.local}
      KEYCLOAK_SMTP_FROM_DISPLAY_NAME: ${KEYCLOAK_SMTP_FROM_DISPLAY_NAME:-Luyen Thi Lai Xe}
      KEYCLOAK_SMTP_REPLY_TO: ${KEYCLOAK_SMTP_REPLY_TO:-no-reply@luyen-thi-lai-xe.local}
      KEYCLOAK_SMTP_REPLY_TO_DISPLAY_NAME: ${KEYCLOAK_SMTP_REPLY_TO_DISPLAY_NAME:-Luyen Thi Lai Xe}
      KEYCLOAK_SMTP_AUTH: ${KEYCLOAK_SMTP_AUTH:-false}
      KEYCLOAK_SMTP_USER: ${KEYCLOAK_SMTP_USER:-}
      KEYCLOAK_SMTP_PASSWORD: ${KEYCLOAK_SMTP_PASSWORD:-}
      KEYCLOAK_SMTP_SSL: ${KEYCLOAK_SMTP_SSL:-false}
      KEYCLOAK_SMTP_STARTTLS: ${KEYCLOAK_SMTP_STARTTLS:-false}
    depends_on:
      keycloak:
        condition: service_started
      mailpit:
        condition: service_started
    restart: "no"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  # ========================================================
  # 6. TOKEN BLACKLIST CACHE (Redis)
  # ========================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  db_identity_data:
  db_user_data:
  db_exam_data:
  db_course_data:
  db_question_data:
  db_notification_data:
  db_analytics_data:
  db_simulation_data:
  db_media_data:
  consul_data:
  rabbitmq_data:
  elasticsearch_data:
  db_keycloak_data:
  redis_data:
