services:
  # ========================================================
  # 1. CÁC CƠ SỞ DỮ LIỆU (Mỗi Service một DB riêng)
  # ========================================================

  # Database cho Identity Service (Quản lý tài khoản, login)
  db-identity:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - db_identity_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d identity_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  # Database cho User Service (Quản lý profile, thông tin người dùng)
  db-user:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5433:5432"
    volumes:
      - db_user_data:/var/lib/postgresql/data
    healthcheck:
