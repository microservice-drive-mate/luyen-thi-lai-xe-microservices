services:
  db-identity:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${IDENTITY_DB_NAME:-identity_db}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_identity_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${IDENTITY_DB_NAME:-identity_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-user:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
