x-observability-env: &observability-env
  LOGSTASH_HOST: logstash
  LOGSTASH_PORT: 5044
  LOG_CONSOLE_FORMAT: json

services:
  db-identity:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${IDENTITY_DB_NAME:-identity_db}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_identity_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${IDENTITY_DB_NAME:-identity_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-user:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${USER_DB_NAME:-user_db}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${USER_DB_NAME:-user_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-exam:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${EXAM_DB_NAME:-exam_db}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_exam_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${EXAM_DB_NAME:-exam_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-course:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${COURSE_DB_NAME:-course_db}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_course_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${COURSE_DB_NAME:-course_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-question:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${QUESTION_DB_NAME:-question_db}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_question_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${QUESTION_DB_NAME:-question_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-notification:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NOTIFICATION_DB_NAME:-notification_db}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_notification_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${NOTIFICATION_DB_NAME:-notification_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-analytics:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ANALYTICS_DB_NAME:-analytics_db}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_analytics_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${ANALYTICS_DB_NAME:-analytics_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-simulation:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SIMULATION_DB_NAME:-simulation_db}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_simulation_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${SIMULATION_DB_NAME:-simulation_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-media:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MEDIA_DB_NAME:-media_db}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_media_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${MEDIA_DB_NAME:-media_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-audit:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUDIT_DB_NAME:-audit_db}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_audit_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${AUDIT_DB_NAME:-audit_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-keycloak:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak_db}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - db_keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME:-keycloak_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres-backup:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - ./docker/backup/postgres-daily-backup.sh:/backup/postgres-daily-backup.sh:ro
      - ./backups:/backups
    environment:
      NODE_ENV: ${NODE_ENV}
      BACKUP_ROOT: /backups/postgres
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_WEEKLY_RETENTION_WEEKS: ${BACKUP_WEEKLY_RETENTION_WEEKS:-4}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      IDENTITY_DB_NAME: ${IDENTITY_DB_NAME:-identity_db}
      USER_DB_NAME: ${USER_DB_NAME:-user_db}
      EXAM_DB_NAME: ${EXAM_DB_NAME:-exam_db}
      COURSE_DB_NAME: ${COURSE_DB_NAME:-course_db}
      QUESTION_DB_NAME: ${QUESTION_DB_NAME:-question_db}
      NOTIFICATION_DB_NAME: ${NOTIFICATION_DB_NAME:-notification_db}
      ANALYTICS_DB_NAME: ${ANALYTICS_DB_NAME:-analytics_db}
      SIMULATION_DB_NAME: ${SIMULATION_DB_NAME:-simulation_db}
      MEDIA_DB_NAME: ${MEDIA_DB_NAME:-media_db}
      AUDIT_DB_NAME: ${AUDIT_DB_NAME:-audit_db}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME:-keycloak_db}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    depends_on:
      db-identity:
        condition: service_healthy
      db-user:
        condition: service_healthy
      db-exam:
        condition: service_healthy
      db-course:
        condition: service_healthy
      db-question:
        condition: service_healthy
      db-notification:
        condition: service_healthy
      db-analytics:
        condition: service_healthy
      db-simulation:
        condition: service_healthy
      db-media:
        condition: service_healthy
      db-audit:
        condition: service_healthy
      db-keycloak:
        condition: service_healthy
    command: sh /backup/postgres-daily-backup.sh

  rabbitmq:
    image: rabbitmq:3-management-alpine
    command: sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server"
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
    ports:
      - "${PRIVATE_BIND:-127.0.0.1}:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
      - "${PRIVATE_BIND:-127.0.0.1}:${RABBITMQ_PROMETHEUS_PORT:-15692}:15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  consul:
    image: hashicorp/consul:1.19
    restart: unless-stopped
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    environment:
      CONSUL_BIND_INTERFACE: eth0
    ports:
      - "${PRIVATE_BIND:-127.0.0.1}:${CONSUL_PORT:-8500}:8500"
    volumes:
      - consul_data:/consul/data
    healthcheck:
      test: ["CMD", "consul", "info"]
      interval: 10s
      timeout: 5s
      retries: 10

  consul-init:
    image: curlimages/curl:latest
    restart: "no"
    volumes:
      - ./docker/consul/init.sh:/consul/init.sh:ro
    environment:
      CONSUL_URL: http://consul:8500
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      STORAGE_ACCOUNT_NAME: ${STORAGE_ACCOUNT_NAME}
      STORAGE_ACCOUNT_KEY: ${STORAGE_ACCOUNT_KEY}
      STORAGE_CONTAINER_NAME: ${STORAGE_CONTAINER_NAME:-media}
      STORAGE_PRESIGNED_URL_EXPIRY: ${STORAGE_PRESIGNED_URL_EXPIRY:-3600}
      GATEWAY_PUBLIC_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8000}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      KONG_CORS_ORIGINS: ${KONG_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
    depends_on:
      consul:
        condition: service_healthy
    command: sh /consul/init.sh

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: ${KEYCLOAK_COMMAND:-start-dev --import-realm}
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-keycloak:5432/${KEYCLOAK_DB_NAME:-keycloak_db}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HOSTNAME_STRICT: ${KEYCLOAK_HOSTNAME_STRICT:-false}
      KC_HTTP_ENABLED: ${KEYCLOAK_HTTP_ENABLED:-true}
      KC_PROXY_HEADERS: ${KEYCLOAK_PROXY_HEADERS:-xforwarded}
    depends_on:
      db-keycloak:
        condition: service_healthy
    ports:
      - "${PUBLIC_BIND:-0.0.0.0}:${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  keycloak-backup:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    volumes:
      - ./docker/keycloak/keycloak-daily-export.sh:/opt/keycloak/keycloak-daily-export.sh:ro
      - ./backups:/backups
    entrypoint: ["/bin/sh", "/opt/keycloak/keycloak-daily-export.sh"]
    environment:
      NODE_ENV: ${NODE_ENV}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_EXPORT_ROOT: /backups/keycloak
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_WEEKLY_RETENTION_WEEKS: ${BACKUP_WEEKLY_RETENTION_WEEKS:-4}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    depends_on:
      - keycloak

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "${PRIVATE_BIND:-127.0.0.1}:${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.3
    restart: unless-stopped
    volumes:
      - ./docker/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "${PRIVATE_BIND:-127.0.0.1}:${LOGSTASH_HOST_PORT:-5044}:5044"
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.3
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "${PRIVATE_BIND:-127.0.0.1}:${KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PRIVATE_BIND:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    depends_on:
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${PRIVATE_BIND:-127.0.0.1}:${ALERTMANAGER_PORT:-9093}:9093"
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${PRIVATE_BIND:-127.0.0.1}:${GRAFANA_PORT:-30000}:3000"
    depends_on:
      - prometheus

  migration-runner:
    image: node:20-alpine
    working_dir: /workspace
    environment:
      CHECKPOINT_DISABLE: "1"
      PRISMA_HIDE_UPDATE_MESSAGE: "true"
    volumes:
      - .:/workspace:ro

  identity-service:
    image: ghcr.io/${GHCR_OWNER}/luyen-thi-lai-xe-identity-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *observability-env
      SERVICE_NAME: identity-service
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      CONSUL_URL: http://consul:8500
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-identity:5432/${IDENTITY_DB_NAME:-identity_db}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
    depends_on:
      db-identity:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_started

  user-service:
    image: ghcr.io/${GHCR_OWNER}/luyen-thi-lai-xe-user-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *observability-env
      SERVICE_NAME: user-service
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      CONSUL_URL: http://consul:8500
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-user:5432/${USER_DB_NAME:-user_db}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
    depends_on:
      db-user:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_started

  exam-service:
    image: ghcr.io/${GHCR_OWNER}/luyen-thi-lai-xe-exam-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *observability-env
      SERVICE_NAME: exam-service
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      CONSUL_URL: http://consul:8500
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-exam:5432/${EXAM_DB_NAME:-exam_db}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      QUESTION_SERVICE_URL: http://question-service:3000
      USER_SERVICE_URL: http://user-service:3000
    depends_on:
      db-exam:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_started

  course-service:
    image: ghcr.io/${GHCR_OWNER}/luyen-thi-lai-xe-course-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *observability-env
      SERVICE_NAME: course-service
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      CONSUL_URL: http://consul:8500
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-course:5432/${COURSE_DB_NAME:-course_db}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
    depends_on:
      db-course:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_started

  question-service:
    image: ghcr.io/${GHCR_OWNER}/luyen-thi-lai-xe-question-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *observability-env
      SERVICE_NAME: question-service
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      CONSUL_URL: http://consul:8500
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-question:5432/${QUESTION_DB_NAME:-question_db}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
    depends_on:
      db-question:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_started

  notification-service:
    image: ghcr.io/${GHCR_OWNER}/luyen-thi-lai-xe-notification-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      <<: *observability-env
      SERVICE_NAME: notification-service
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      CONSUL_URL: http://consul:8500
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-notification:5432/${NOTIFICATION_DB_NAME:-notification_db}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
    depends_on:
      db-notification:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
