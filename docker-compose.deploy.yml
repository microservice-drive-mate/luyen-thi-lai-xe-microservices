      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      QUESTION_SERVICE_URL: http://question-service:3000
      USER_SERVICE_URL: http://user-service:3000
    depends_on:
