    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MEDIA_DB_NAME:-media_db}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_media_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${MEDIA_DB_NAME:-media_db}"]
      interval: 5s
      timeout: 5s
