        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_started

  kong:
    image: kong:3.7
    restart: unless-stopped
    user: "root"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    depends_on:
      - identity-service
      - user-service
      - exam-service
      - course-service
      - question-service
      - notification-service
      - analytics-service
      - simulation-service
      - media-service
      - audit-service
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"
      - "${KONG_ADMIN_PORT:-8001}:8001"
    volumes:
      - ./kong/kong.yaml:/usr/local/kong/declarative/kong.yaml:ro

volumes:
  db_identity_data:
  db_user_data:
  db_exam_data:
  db_course_data:
  db_question_data:
  db_notification_data:
  db_analytics_data:
  db_simulation_data:
  db_media_data:
  db_audit_data:
  db_keycloak_data:
  rabbitmq_data:
  redis_data:
  consul_data:
