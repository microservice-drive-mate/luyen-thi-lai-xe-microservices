    user: "root"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    depends_on:
      - identity-service
      - user-service
      - exam-service
      - course-service
      - question-service
      - notification-service
      - analytics-service
      - simulation-service
      - media-service
      - audit-service
    ports:
      - "${PUBLIC_BIND:-0.0.0.0}:${KONG_PROXY_PORT:-8000}:8000"
      - "${PRIVATE_BIND:-127.0.0.1}:${KONG_ADMIN_PORT:-8001}:8001"
    volumes:
      - ./kong/kong.yaml:/usr/local/kong/declarative/kong.yaml:ro

