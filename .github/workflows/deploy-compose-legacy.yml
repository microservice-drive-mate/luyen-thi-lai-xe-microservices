name: Legacy SSH Compose Deploy

on:
  workflow_run:
    workflows: ["CI/CD Pipeline for Microservices"]
    types: [completed]
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Target environment. Remote env file must be <deploy_env>.env"
        type: choice
        required: true
        default: production
        options:
          - staging
          - production
      deploy_host:
        description: "Remote VM host or public IP, for example GCP Compute Engine"
        type: string
        required: true
      deploy_path:
        description: "Remote deployment directory"
        type: string
        required: true
        default: "/opt/luyen-thi-lai-xe-microservices"
      image_tag:
        description: "Docker image tag to deploy"
        type: string
        required: true
        default: "latest"
      ghcr_owner:
        description: "GHCR owner/namespace used by service images"
        type: string
        required: true
        default: "nhactaohocbai"

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-compose-${{ github.event.inputs.deploy_env || 'production' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.image_tag || github.event.workflow_run.head_sha || 'latest' }} to ${{ github.event.inputs.deploy_env || 'production' }}
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ github.event.inputs.deploy_env || 'production' }}

    env:
      DEPLOY_ENV: ${{ github.event.inputs.deploy_env || 'production' }}
      DEPLOY_HOST: ${{ github.event.inputs.deploy_host || secrets.DEPLOY_HOST || secrets.VPS_HOST }}
      DEPLOY_PATH: ${{ github.event.inputs.deploy_path || secrets.DEPLOY_PATH || secrets.VPS_DEPLOY_PATH || '/opt/luyen-thi-lai-xe-microservices' }}
      GHCR_OWNER: ${{ github.event.inputs.ghcr_owner || 'nhactaohocbai' }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag || github.event.workflow_run.head_sha || 'latest' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || secrets.VPS_USER }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY || secrets.VPS_SSH_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY GHCR_USERNAME GHCR_TOKEN; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Verify remote Docker
        shell: bash
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "docker --version && docker compose version"

      - name: Deploy via docker compose
        shell: bash
        run: bash scripts/deploy-compose.sh
