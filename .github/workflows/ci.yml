name: Main Image Release

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality-gate:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm exec turbo run prisma:generate

      - name: Format & Lint Check
        run: pnpm exec biome ci .

      - name: TypeScript Check
        run: pnpm exec turbo run check-types

      - name: Run Tests
        run: pnpm exec turbo run test

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            all-services:
              - '.github/workflows/**'
              - 'Dockerfile.service'
              - 'Dockerfile.migration-runner'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'charts/**'
              - 'docker/**'
              - 'deploy/**'
              - 'consul-seed-*.json'
            identity-service:
              - 'apps/identity-service/**'
              - 'packages/**'
            analytics-service:
              - 'apps/analytics-service/**'
              - 'packages/**'
            course-service:
              - 'apps/course-service/**'
              - 'packages/**'
            exam-service:
              - 'apps/exam-service/**'
              - 'packages/**'
            notification-service:
              - 'apps/notification-service/**'
              - 'packages/**'
            question-service:
              - 'apps/question-service/**'
              - 'packages/**'
            simulation-service:
              - 'apps/simulation-service/**'
              - 'packages/**'
            user-service:
              - 'apps/user-service/**'
              - 'packages/**'
            media-service:
              - 'apps/media-service/**'
              - 'packages/**'
            audit-service:
              - 'apps/audit-service/**'
              - 'packages/**'

      - name: Build matrix
        id: set-matrix
        shell: bash
        run: |
          CHANGED='${{ steps.filter.outputs.changes }}'
          ALL_SERVICES_JSON='["identity-service","analytics-service","course-service","exam-service","notification-service","question-service","simulation-service","user-service","media-service","audit-service"]'
          SERVICES="[]"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "Main push uses one immutable release tag for the whole Helm release -> build all production services"
            SERVICES="$ALL_SERVICES_JSON"
            printf 'services=%s\n' "$SERVICES" >> "$GITHUB_OUTPUT"
            echo "Final services to build: $SERVICES"
            exit 0
          fi

          if printf '%s\n' "$CHANGED" | jq -e 'index("all-services") != null' > /dev/null; then
            echo "DevOps/shared build inputs changed -> build all services"
            SERVICES="$ALL_SERVICES_JSON"
            printf 'services=%s\n' "$SERVICES" >> "$GITHUB_OUTPUT"
            echo "Final services to build: $SERVICES"
            exit 0
          fi

          while IFS= read -r SERVICE; do
            CHANGED_MATCH=$(printf '%s\n' "$CHANGED" | jq -rc --arg s "$SERVICE" 'map(select(. == $s)) | length')

            if [ "$CHANGED_MATCH" -gt "0" ]; then
              echo "$SERVICE: files changed -> build"
              SERVICES=$(printf '%s\n' "$SERVICES" | jq -rc --arg s "$SERVICE" '. + [$s]')
              continue
            fi

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://ghcr.io/v2/${{ github.repository_owner }}/luyen-thi-lai-xe-$SERVICE/manifests/latest")

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "$SERVICE: image missing on GHCR -> build"
              SERVICES=$(printf '%s\n' "$SERVICES" | jq -rc --arg s "$SERVICE" '. + [$s]')
            fi
          done < <(printf '%s\n' "$ALL_SERVICES_JSON" | jq -rc '.[]')

          printf 'services=%s\n' "$SERVICES" >> "$GITHUB_OUTPUT"
          echo "Final services to build: $SERVICES"

  build:
    name: Build Services
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      needs.detect-changes.outputs.services != '[]' &&
      needs.detect-changes.outputs.services != '' &&
      needs.detect-changes.outputs.services != 'null'

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    steps:
      - name: Start Timer
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "Docker build attempt $attempt/3 for ${{ matrix.service }}"

            if docker buildx build \
              --file "./apps/${{ matrix.service }}/Dockerfile" \
              --tag "ghcr.io/${{ github.repository_owner }}/luyen-thi-lai-xe-${{ matrix.service }}:latest" \
              --tag "ghcr.io/${{ github.repository_owner }}/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}" \
              --cache-from "type=gha,scope=${{ matrix.service }}" \
              --cache-to "type=gha,mode=max,scope=${{ matrix.service }}" \
              --provenance=false \
              --load \
              .; then
              exit 0
            fi

            if [[ "$attempt" == "3" ]]; then
              echo "Docker build failed after 3 attempts"
              exit 1
            fi

            sleep_seconds=$((attempt * 30))
            echo "Docker build failed, retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}
          scanners: vuln
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json
          dependency-snapshot: false
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}-${{ github.sha }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 90

      - name: Push Docker Image
        id: push-image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REPO="ghcr.io/${{ github.repository_owner }}/luyen-thi-lai-xe-${{ matrix.service }}"
          IMAGE_TAG="${IMAGE_REPO}:${{ github.sha }}"

          docker push "$IMAGE_TAG"
          docker push "${IMAGE_REPO}:latest"

          DIGEST="$(docker buildx imagetools inspect "$IMAGE_TAG" --format '{{.Manifest.Digest}}')"
          IMAGE_REF="${IMAGE_REPO}@${DIGEST}"

          echo "image-ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved immutable image reference: ${IMAGE_REF}"

      - name: Install Cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign immutable image and attach SBOM attestation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ steps.push-image.outputs.image-ref }}"

          retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi

              if [[ "$attempt" == "5" ]]; then
                echo "Command failed after 5 attempts: $*"
                return 1
              fi

              sleep_seconds=$((attempt * 20))
              echo "Command failed, retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
            done
          }

          retry cosign sign --yes "$IMAGE"
          retry cosign attest --yes --predicate "sbom-${{ matrix.service }}.spdx.json" --type spdxjson "$IMAGE"

      - name: Verify image signature
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.push-image.outputs.image-ref }}"

      - name: Get image size
        id: size
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/luyen-thi-lai-xe-${{ matrix.service }}:latest 2>/dev/null || true
          SIZE=$(docker image inspect ghcr.io/${{ github.repository_owner }}/luyen-thi-lai-xe-${{ matrix.service }}:latest \
            --format='{{.Size}}' 2>/dev/null | awk '{printf "%.1f MB", $1/1024/1024}' || echo "N/A")
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Build Summary
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION="$(( (END_TIME - START_TIME) / 60 ))m $(( (END_TIME - START_TIME) % 60 ))s"

          STATUS="${{ job.status }}"
          if [[ "$STATUS" == "success" ]]; then ICON="✅"
          elif [[ "$STATUS" == "cancelled" ]]; then ICON="⏹️"
          else ICON="❌"
          fi

          SIZE="${{ steps.size.outputs.size }}"
          [ -z "$SIZE" ] && SIZE="N/A"

          {
            echo "## $ICON ${{ matrix.service }}"
            echo "| Property | Value |"
            echo "| :--- | :--- |"
            echo "| Status | $STATUS |"
            echo "| Build Duration | **$DURATION** |"
            echo "| Image Size | $SIZE |"
            echo "| SHA | \`${{ github.sha }}\` |"
            echo ""
            echo "---"
          } >> "$GITHUB_STEP_SUMMARY"

  build-migration-runner:
    name: Build Migration Runner
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Start Timer
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Migration Runner Image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --file Dockerfile.migration-runner \
            --tag ghcr.io/${{ github.repository_owner }}/luyen-thi-lai-xe-migration-runner:${{ github.sha }} \
            --tag ghcr.io/${{ github.repository_owner }}/luyen-thi-lai-xe-migration-runner:latest \
            --cache-from type=gha,scope=migration-runner \
            --cache-to type=gha,mode=max,scope=migration-runner \
            --provenance=false \
            --load \
            .

      - name: Scan Migration Runner with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/luyen-thi-lai-xe-migration-runner:${{ github.sha }}
          scanners: vuln
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate Migration Runner SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/luyen-thi-lai-xe-migration-runner:${{ github.sha }}
          format: spdx-json
          output-file: sbom-migration-runner.spdx.json
          dependency-snapshot: false
          upload-artifact: false
          upload-release-assets: false

      - name: Upload Migration Runner SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-migration-runner-${{ github.sha }}
          path: sbom-migration-runner.spdx.json
          retention-days: 90

      - name: Push Migration Runner Image
        id: push-migration-runner-image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REPO="ghcr.io/${{ github.repository_owner }}/luyen-thi-lai-xe-migration-runner"
          IMAGE_TAG="${IMAGE_REPO}:${{ github.sha }}"

          docker push "$IMAGE_TAG"
          docker push "${IMAGE_REPO}:latest"

          DIGEST="$(docker buildx imagetools inspect "$IMAGE_TAG" --format '{{.Manifest.Digest}}')"
          IMAGE_REF="${IMAGE_REPO}@${DIGEST}"

          echo "image-ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved immutable image reference: ${IMAGE_REF}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign immutable migration runner image and attach SBOM attestation
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ steps.push-migration-runner-image.outputs.image-ref }}"

          retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi

              if [[ "$attempt" == "5" ]]; then
                echo "Command failed after 5 attempts: $*"
                return 1
              fi

              sleep_seconds=$((attempt * 20))
              echo "Command failed, retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
            done
          }

          retry cosign sign --yes "$IMAGE"
          retry cosign attest --yes --predicate "sbom-migration-runner.spdx.json" --type spdxjson "$IMAGE"

      - name: Verify migration runner image signature
        shell: bash
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.push-migration-runner-image.outputs.image-ref }}"

      - name: Build Summary
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION="$(( (END_TIME - START_TIME) / 60 ))m $(( (END_TIME - START_TIME) % 60 ))s"
          {
            echo "## migration-runner"
            echo "| Property | Value |"
            echo "| :--- | :--- |"
            echo "| Status | ${{ job.status }} |"
            echo "| Build Duration | **$DURATION** |"
            echo "| SHA | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-staging:
    name: Deploy GCP Staging
    runs-on: ubuntu-latest
    needs: [build, build-migration-runner]
    timeout-minutes: 30
    concurrency:
      group: deploy-gcp-staging
      cancel-in-progress: false
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.build.result == 'success' &&
      needs.build-migration-runner.result == 'success' &&
      (vars.GCP_AUTO_DEPLOY_ENABLED == '' || vars.GCP_AUTO_DEPLOY_ENABLED == 'true')
    environment: staging
    env:
      IMAGE_TAG: ${{ github.sha }}
      KUBE_CONFIG_B64: ${{ secrets.STAGING_KUBE_CONFIG_B64 }}
      API_HOST: ${{ vars.STAGING_API_HOST }}
      AUTH_HOST: ${{ vars.STAGING_AUTH_HOST }}
      FRONTEND_ORIGIN: ${{ vars.STAGING_FRONTEND_ORIGIN }}
      API_SCHEME: ${{ vars.STAGING_API_SCHEME }}
      STAGING_SEED_ENABLED: ${{ vars.STAGING_SEED_ENABLED }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      POSTGRES_PASSWORD: ${{ secrets.STAGING_POSTGRES_PASSWORD }}
      RABBITMQ_DEFAULT_PASS: ${{ secrets.STAGING_RABBITMQ_PASSWORD }}
      RABBITMQ_ERLANG_COOKIE: ${{ secrets.STAGING_RABBITMQ_ERLANG_COOKIE }}
      KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.STAGING_KEYCLOAK_ADMIN_PASSWORD }}
      KEYCLOAK_CLIENT_SECRET: ${{ secrets.STAGING_KEYCLOAK_CLIENT_SECRET }}
      STORAGE_ACCOUNT_NAME: ${{ secrets.STAGING_STORAGE_ACCOUNT_NAME }}
      STORAGE_ACCOUNT_KEY: ${{ secrets.STAGING_STORAGE_ACCOUNT_KEY }}
      GCP_VM_NAME: luyen-thi-lai-xe-staging-k3s
      GCP_VM_ZONE: asia-southeast1-b
      GCP_PROJECT_ID: devops-497910
    steps:
      - uses: actions/checkout@v4

      - name: Mark deployment start
        shell: bash
        run: echo "DEPLOYMENT_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - uses: azure/setup-helm@v4

      - uses: azure/setup-kubectl@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Start IAP tunnel to K3s API
        shell: bash
        run: |
          set -euo pipefail

          # Cài đặt numpy để tăng tốc và tối ưu hóa băng thông IAP tunnel (ngăn chặn treo mạng khi truyền manifest lớn)
          echo "🚀 Installing NumPy to optimize Google Cloud IAP tunnel bandwidth..."
          pip install --no-cache-dir numpy

          gcloud compute start-iap-tunnel "$GCP_VM_NAME" 6443 \
            --local-host-port=127.0.0.1:16443 \
            --zone="$GCP_VM_ZONE" \
            --project="$GCP_PROJECT_ID" &
          TUNNEL_PID=$!
          echo "TUNNEL_PID=$TUNNEL_PID" >> "$GITHUB_ENV"
          for i in $(seq 1 60); do
            if nc -z 127.0.0.1 16443 2>/dev/null; then
              echo "✅ IAP tunnel ready (attempt $i)"
              exit 0
            fi
            sleep 1
          done
          echo "❌ IAP tunnel failed to start within 60s"
          kill "$TUNNEL_PID" 2>/dev/null || true
          exit 1

      - name: Validate Kubernetes deployment inputs
        shell: bash
        run: |
          set -euo pipefail
          required_vars=(
            IMAGE_TAG
            KUBE_CONFIG_B64
            API_HOST
            AUTH_HOST
            FRONTEND_ORIGIN
            GHCR_PULL_USERNAME
            GHCR_PULL_TOKEN
            POSTGRES_PASSWORD
            RABBITMQ_DEFAULT_PASS
            RABBITMQ_ERLANG_COOKIE
            KEYCLOAK_ADMIN_PASSWORD
            KEYCLOAK_CLIENT_SECRET
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Missing required value: ${var_name}" >&2
              exit 1
            fi
          done

      - name: Configure kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.kube
          printf '%s' "$KUBE_CONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: Render Helm values
        shell: bash
        run: |
          set -euo pipefail
          export HELM_VALUES_FILE="$RUNNER_TEMP/staging-values.json"
          API_SCHEME="${API_SCHEME:-http}"
          GATEWAY_PUBLIC_URL="${API_SCHEME}://${API_HOST}"
          KEYCLOAK_PUBLIC_URL="${API_SCHEME}://${AUTH_HOST}"
          export API_SCHEME GATEWAY_PUBLIC_URL KEYCLOAK_PUBLIC_URL

          node <<'NODE'
          const fs = require('node:fs');
          const env = process.env;
          const origins = [
            env.FRONTEND_ORIGIN,
            env.GATEWAY_PUBLIC_URL,
            env.KEYCLOAK_PUBLIC_URL,
          ].flatMap((value) => String(value || '').split(','))
            .map((value) => value.trim())
            .filter(Boolean);

          const values = {
            global: {
              imageTag: env.IMAGE_TAG,
              imageRegistry: `ghcr.io/${{ github.repository_owner }}`,
              nodeEnv: 'staging',
              storageClassName: 'local-path'
            },
            migration: { imageTag: env.IMAGE_TAG },
            imagePullSecret: {
              enabled: true,
              username: env.GHCR_PULL_USERNAME,
              token: env.GHCR_PULL_TOKEN,
            },
            ingress: {
              apiHost: env.API_HOST,
              authHost: env.AUTH_HOST,
              ...(env.API_SCHEME === 'https' ? {
                annotations: {
                  'cert-manager.io/cluster-issuer': 'letsencrypt-http01',
                },
                tls: {
                  enabled: true,
                  secretName: 'luyen-thi-lai-xe-tls',
                },
              } : {}),
            },
            config: {
              frontendOrigin: env.FRONTEND_ORIGIN,
              gatewayPublicUrl: env.GATEWAY_PUBLIC_URL,
              keycloakPublicUrl: env.KEYCLOAK_PUBLIC_URL,
              corsOrigins: [...new Set(origins)],
            },
            seed: {
              enabled: String(env.STAGING_SEED_ENABLED || '').toLowerCase() === 'true',
            },
            secrets: {
              postgresPassword: env.POSTGRES_PASSWORD,
              rabbitmqPassword: env.RABBITMQ_DEFAULT_PASS,
              rabbitmqErlangCookie: env.RABBITMQ_ERLANG_COOKIE,
              keycloakAdminPassword: env.KEYCLOAK_ADMIN_PASSWORD,
              keycloakClientSecret: env.KEYCLOAK_CLIENT_SECRET,
              storageAccountName: env.STORAGE_ACCOUNT_NAME || '',
              storageAccountKey: env.STORAGE_ACCOUNT_KEY || '',
            },
          };

          fs.writeFileSync(env.HELM_VALUES_FILE, JSON.stringify(values, null, 2));
          NODE

      - name: Auto-heal stuck Helm release and cleanup old jobs
        shell: bash
        run: |
          set -euo pipefail

          # 1. Tự động gỡ kẹt release Helm nếu có
          STATUS=$(helm list -n staging -f "^luyen-thi-lai-xe$" -o json | jq -r '.[0].status // empty')
          echo "Current Helm release status: $STATUS"

          if [[ "$STATUS" == "pending-upgrade" || "$STATUS" == "pending-install" || "$STATUS" == "pending-rollback" ]]; then
            echo "⚠️ Helm release is stuck in '$STATUS' state. Attempting self-healing..."
            
            # Tìm revision bị kẹt từ lịch sử Helm
            STUCK_REVISION=$(helm history luyen-thi-lai-xe -n staging -o json | jq -r '.[] | select(.status=="pending-upgrade" or .status=="pending-install" or .status=="pending-rollback") | .revision' | tail -n 1)
            
            if [[ -n "$STUCK_REVISION" ]]; then
              echo "🗑️ Deleting stuck Helm release secret for revision v$STUCK_REVISION..."
              kubectl delete secret "sh.helm.release.v1.luyen-thi-lai-xe.v$STUCK_REVISION" -n staging || true
              echo "✅ Stuck release state cleared."
            else
              echo "⚠️ Could not identify stuck revision from history. Proceeding anyway..."
            fi
          else
            echo "✅ Helm release is not stuck (Status: '${STATUS:-not-deployed}'). No action needed."
          fi

          # 2. Dọn dẹp các Job cũ để tránh lỗi immutable khi Helm upgrade
          echo "🧹 Cleaning up old Jobs to avoid immutable field errors..."
          kubectl delete jobs -n staging -l app.kubernetes.io/instance=luyen-thi-lai-xe --ignore-not-found
          echo "✅ Old jobs cleanup completed."

      - name: Deploy Helm release
        shell: bash
        run: |
          set -euo pipefail
          helm lint charts/luyen-thi-lai-xe -f "$RUNNER_TEMP/staging-values.json"
          helm upgrade --install luyen-thi-lai-xe charts/luyen-thi-lai-xe \
            --namespace staging \
            --create-namespace \
            --wait \
            --wait-for-jobs \
            --timeout 25m \
            -f "$RUNNER_TEMP/staging-values.json"

      - name: Debug deployment failure
        if: failure()
        shell: bash
        run: |
          set -uo pipefail
          echo "========== HELM RELEASE STATUS =========="
          helm list -n staging || true
          echo ""
          echo "========== HELM HISTORY =========="
          helm history luyen-thi-lai-xe -n staging || true
          echo ""
          echo "========== STORAGE CLASSES =========="
          kubectl get storageclass || true
          echo ""
          echo "========== PVCs =========="
          kubectl get pvc -n staging || true
          echo ""
          echo "========== ALL PODS =========="
          kubectl get pods -n staging -o wide || true
          echo ""
          echo "========== POD DESCRIPTIONS =========="
          for pod in $(kubectl get pods -n staging --no-headers -o custom-columns=":metadata.name" 2>/dev/null | head -20); do
            echo "--- Describing pod: $pod ---"
            kubectl describe pod "$pod" -n staging 2>/dev/null | tail -40
            echo ""
          done
          echo ""
          echo "========== KONG ROLLOUT DEBUG =========="
          kubectl describe deployment luyen-thi-lai-xe-kong -n staging 2>/dev/null || true
          echo ""
          kubectl get rs,pods -n staging -l app.kubernetes.io/component=kong -o wide 2>/dev/null || true
          echo ""
          for pod in $(kubectl get pods -n staging -l app.kubernetes.io/component=kong --no-headers -o custom-columns=":metadata.name" 2>/dev/null); do
            echo "--- Describing Kong pod: $pod ---"
            kubectl describe pod "$pod" -n staging 2>/dev/null || true
            echo ""
            echo "--- Current Kong logs: $pod ---"
            kubectl logs "$pod" -n staging --all-containers --tail=120 2>/dev/null || true
            echo ""
            echo "--- Previous Kong logs: $pod ---"
            kubectl logs "$pod" -n staging --all-containers --previous --tail=120 2>/dev/null || true
            echo ""
          done
          echo ""
          echo "========== NON-RUNNING POD DEBUG =========="
          for pod in $(kubectl get pods -n staging --field-selector=status.phase!=Running,status.phase!=Succeeded --no-headers -o custom-columns=":metadata.name" 2>/dev/null); do
            echo "--- Describing non-running pod: $pod ---"
            kubectl describe pod "$pod" -n staging 2>/dev/null || true
            echo ""
            echo "--- Current logs: $pod ---"
            kubectl logs "$pod" -n staging --all-containers --tail=120 2>/dev/null || true
            echo ""
            echo "--- Previous logs: $pod ---"
            kubectl logs "$pod" -n staging --all-containers --previous --tail=120 2>/dev/null || true
            echo ""
          done
          echo ""
          echo "========== POD LOGS (last 30 lines per container) =========="
          for pod in $(kubectl get pods -n staging --no-headers -o custom-columns=":metadata.name" 2>/dev/null | head -10); do
            echo "--- Logs for pod: $pod ---"
            kubectl logs "$pod" -n staging --all-containers --tail=30 2>/dev/null || true
            echo ""
          done
          echo ""
          echo "========== EVENTS (last 50) =========="
          kubectl get events -n staging --sort-by='.metadata.creationTimestamp' 2>/dev/null | tail -50 || true
          echo ""
          echo "========== NODE RESOURCES =========="
          kubectl top nodes 2>/dev/null || kubectl describe nodes | grep -A 20 "Allocated resources" || true

      - name: Verify rollout and smoke
        shell: bash
        run: |
          set -euo pipefail
          kubectl wait --for=condition=complete job -l app.kubernetes.io/component=consul-seed -n staging --timeout=10m
          kubectl wait --for=condition=complete job -l app.kubernetes.io/component=migration -n staging --timeout=10m
          if kubectl get job -l app.kubernetes.io/component=seed -n staging --no-headers 2>/dev/null | grep -q .; then
            kubectl wait --for=condition=complete job -l app.kubernetes.io/component=seed -n staging --timeout=15m
          fi
          kubectl rollout status deployment -l app.kubernetes.io/component=app -n staging --timeout=10m
          kubectl get jobs -n staging
          API_SCHEME="${API_SCHEME:-http}"
          SMOKE_BASE_URL="${API_SCHEME}://${API_HOST}" bash scripts/k8s-smoke.sh

      - name: Cleanup IAP tunnel
        if: always()
        shell: bash
        run: |
          if [[ -n "${TUNNEL_PID:-}" ]]; then
            kill "$TUNNEL_PID" 2>/dev/null || true
            echo "IAP tunnel (PID $TUNNEL_PID) terminated"
          fi

      - name: Record deployment event
        if: always()
        env:
          DEPLOYMENT_ENVIRONMENT: staging
          DEPLOYMENT_TYPE: helm
          DEPLOYMENT_TARGET: gcp-k3s
          DEPLOYMENT_RELEASE_NAME: luyen-thi-lai-xe
          DEPLOYMENT_NAMESPACE: staging
          DEPLOYMENT_IMAGE_TAG: ${{ github.sha }}
          DEPLOYMENT_GIT_SHA: ${{ github.sha }}
          DEPLOYMENT_STATUS: ${{ job.status }}
          DEPLOYMENT_SMOKE_STATUS: ${{ job.status }}
        run: node scripts/devops-record-deployment.js

      - name: Upload deployment event
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-event-staging-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/deployments/events/
          retention-days: 90
