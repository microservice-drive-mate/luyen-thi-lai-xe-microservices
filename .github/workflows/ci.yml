name: CI/CD Pipeline cho Microservices

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ==========================================
  # 1: QUALITY GATE
  # ==========================================
  quality-gate:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: |
          npx turbo run prisma:generate --filter=...[HEAD^] || \
          npx turbo run prisma:generate

      - name: Format Check
        run: npx @biomejs/biome format --write .

      - name: TypeScript Typecheck
        run: npx turbo run typecheck

      - name: Unit & E2E Tests
        run: npx turbo run test

  # ==========================================
  # 2: PHÁT HIỆN THAY ĐỔI
  # ==========================================
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            identity-service:
              - 'apps/identity-service/**'
              - 'packages/**'
            analytics-service:
              - 'apps/analytics-service/**'
              - 'packages/**'
            course-service:
              - 'apps/course-service/**'
              - 'packages/**'
            exam-service:
              - 'apps/exam-service/**'
              - 'packages/**'
            notification-service:
              - 'apps/notification-service/**'
              - 'packages/**'
            question-service:
              - 'apps/question-service/**'
              - 'packages/**'
            simulation-service:
              - 'apps/simulation-service/**'
              - 'packages/**'
            user-service:
              - 'apps/user-service/**'
              - 'packages/**'

  # ==========================================
  # 3: BUILD DOCKER & DEPLOY
  # ==========================================
  build-and-deploy:
    name: Build & Deploy to Render
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    strategy:
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          push: true
          # Tag cả :latest lẫn :sha để Render pull đúng image mới
          tags: |
            ghcr.io/${{ github.repository_owner }}/luyen-thi-lai-xe-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Trigger Deploy on Render
        run: |
          echo "Fetching service ID for ${{ matrix.service }}..."

          # Lấy service ID theo tên service
          RESPONSE=$(curl -sf "https://api.render.com/v1/services?name=luyen-thi-lai-xe-${{ matrix.service }}&limit=1" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json")

          SERVICE_ID=$(echo "$RESPONSE" | jq -r '.[0].service.id // empty')

          if [ -z "$SERVICE_ID" ]; then
            echo "Lỗi: Không tìm thấy service 'luyen-thi-lai-xe-${{ matrix.service }}' trên Render"
            echo "Kiểm tra lại tên service trong render.yaml"
            exit 1
          fi

          echo "Service ID: $SERVICE_ID"
          echo "Triggering deploy..."

          curl -sf -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}'

          echo "Deploy triggered cho ${{ matrix.service }}"

      - name: Build Report
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON="✅"
          if [ "$STATUS" != "success" ]; then ICON="❌"; fi

          IMAGE="ghcr.io/${{ github.repository_owner }}/luyen-thi-lai-xe-${{ matrix.service }}:latest"
          docker pull "$IMAGE" 2>/dev/null || true
          SIZE=$(docker image inspect "$IMAGE" --format='{{.Size}}' 2>/dev/null | \
            awk '{printf "%.1f MB", $1/1024/1024}' || echo "N/A")

          echo "## $ICON Build Report: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | \`${{ matrix.service }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Image size | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA tag | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | \`ghcr.io\` |" >> $GITHUB_STEP_SUMMARY
