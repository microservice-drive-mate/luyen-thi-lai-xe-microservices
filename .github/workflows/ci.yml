name: CI/CD Pipeline for Microservices

on:
  push:
    branches: ["main", "staging"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write
  pull-requests: write
  issues: write

jobs:
  quality-gate:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma Client
        run: npx turbo run prisma:generate

      - name: Format & Lint Check
        run: npx @biomejs/biome ci .

      - name: TypeScript Check
        run: npx turbo run check-types

      - name: Run Tests
        run: npx turbo run test

  staging-migrations:
    name: Deploy Prisma Migrations to Staging
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run Prisma migrate deploy
        env:
          CONSUL_URL: ${{ secrets.STAGING_CONSUL_URL }}
          NODE_ENV: staging
        run: npm run db:deploy -- staging

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            all-services:
              - '.github/workflows/ci.yml'
              - 'Dockerfile.service'
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - 'docker/**'
              - 'deploy/**'
              - 'consul-seed-*.json'
            identity-service:
              - 'apps/identity-service/**'
              - 'packages/**'
            analytics-service:
              - 'apps/analytics-service/**'
              - 'packages/**'
            course-service:
              - 'apps/course-service/**'
              - 'packages/**'
            exam-service:
              - 'apps/exam-service/**'
              - 'packages/**'
            notification-service:
              - 'apps/notification-service/**'
              - 'packages/**'
            question-service:
              - 'apps/question-service/**'
              - 'packages/**'
            simulation-service:
              - 'apps/simulation-service/**'
              - 'packages/**'
            user-service:
              - 'apps/user-service/**'
              - 'packages/**'
            media-service:
              - 'apps/media-service/**'
              - 'packages/**'
            audit-service:
              - 'apps/audit-service/**'
              - 'packages/**'

      - name: Build matrix
        id: set-matrix
        run: |
          CHANGED='${{ steps.filter.outputs.changes }}'
          ALL_SERVICES='["identity-service","analytics-service","course-service","exam-service","notification-service","question-service","simulation-service","user-service","media-service","audit-service"]'
          SERVICES="[]"

          if echo "$CHANGED" | jq -e 'index("all-services") != null' > /dev/null; then
            echo "DevOps/shared build inputs changed -> build all services"
            SERVICES="$ALL_SERVICES"
            echo "services=$SERVICES" >> $GITHUB_OUTPUT
            echo "Final services to build: $SERVICES"
            exit 0
          fi

          for SERVICE in $(echo $ALL_SERVICES | jq -rc '.[]'); do
            CHANGED_MATCH=$(echo $CHANGED | jq -rc --arg s "$SERVICE" 'map(select(. == $s)) | length')
            
            if [ "$CHANGED_MATCH" -gt "0" ]; then
              echo "$SERVICE: files changed -> build"
              SERVICES=$(echo $SERVICES | jq -rc --arg s "$SERVICE" '. + [$s]')
              continue
            fi

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://ghcr.io/v2/${{ github.repository_owner }}/luyen-thi-lai-xe-$SERVICE/manifests/latest")

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "$SERVICE: image missing on GHCR -> build"
              SERVICES=$(echo $SERVICES | jq -rc --arg s "$SERVICE" '. + [$s]')
            fi
          done

          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "Final services to build: $SERVICES"

  label-pr:
    name: Label Pull Request
    needs: detect-changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Create labels if not exist & add to PR
        uses: actions/github-script@v7
        with:
          script: |
            const services = ${{ needs.detect-changes.outputs.services }};
            if (!services || services.length === 0) return;

            for (const service of services) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: `service: ${service}`,
                  color: 'ededed',
                });
              } catch (e) {}
            }

            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: services.map(s => `service: ${s}`),
            });

  build:
    name: Build Services
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      needs.detect-changes.outputs.services != '[]' &&
      needs.detect-changes.outputs.services != '' &&
      needs.detect-changes.outputs.services != 'null'

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    steps:
      - name: Start Timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "Docker build attempt $attempt/3 for ${{ matrix.service }}"

            if docker buildx build \
              --file "./apps/${{ matrix.service }}/Dockerfile" \
              --tag "ghcr.io/nhactaohocbai/luyen-thi-lai-xe-${{ matrix.service }}:latest" \
              --tag "ghcr.io/nhactaohocbai/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}" \
              --cache-from "type=gha,scope=${{ matrix.service }}" \
              --cache-to "type=gha,mode=max,scope=${{ matrix.service }}" \
              --provenance=false \
              --load \
              .; then
              exit 0
            fi

            if [[ "$attempt" == "3" ]]; then
              echo "Docker build failed after 3 attempts"
              exit 1
            fi

            sleep_seconds=$((attempt * 30))
            echo "Docker build failed, retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/nhactaohocbai/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}
          scanners: vuln
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Push Docker Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          docker push ghcr.io/nhactaohocbai/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}
          docker push ghcr.io/nhactaohocbai/luyen-thi-lai-xe-${{ matrix.service }}:latest

      - name: Get image size
        id: size
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker pull ghcr.io/nhactaohocbai/luyen-thi-lai-xe-${{ matrix.service }}:latest 2>/dev/null || true
          SIZE=$(docker image inspect ghcr.io/nhactaohocbai/luyen-thi-lai-xe-${{ matrix.service }}:latest \
            --format='{{.Size}}' 2>/dev/null | awk '{printf "%.1f MB", $1/1024/1024}' || echo "N/A")
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Build Summary
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION="$(( (END_TIME - START_TIME) / 60 ))m $(( (END_TIME - START_TIME) % 60 ))s"

          STATUS="${{ job.status }}"
          if [[ "$STATUS" == "success" ]]; then ICON="✅"
          elif [[ "$STATUS" == "cancelled" ]]; then ICON="⏹️"
          else ICON="❌"
          fi

          SIZE="${{ steps.size.outputs.size }}"
          [ -z "$SIZE" ] && SIZE="N/A (PR — not pushed)"

          echo "## $ICON ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Duration | **$DURATION** |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
