name: CI/CD Pipeline cho Microservices

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ==========================================
  # 1. QUALITY GATE
  # ==========================================
  quality-gate:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx turbo run prisma:generate

      - name: Format Check
        run: npx @biomejs/biome format .

      - name: TypeScript Check
        run: npx turbo run check-types

      - name: Run Tests
        run: npx turbo run test

  # ==========================================
  # 2. DETECT CHANGES
  # ==========================================
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      services: ${{ steps.set-matrix.outputs.services }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            identity-service:
              - 'apps/identity-service/**'
              - 'packages/**'
            analytics-service:
              - 'apps/analytics-service/**'
              - 'packages/**'
            course-service:
              - 'apps/course-service/**'
              - 'packages/**'
            exam-service:
              - 'apps/exam-service/**'
              - 'packages/**'
            notification-service:
              - 'apps/notification-service/**'
              - 'packages/**'
            question-service:
              - 'apps/question-service/**'
              - 'packages/**'
            simulation-service:
              - 'apps/simulation-service/**'
              - 'packages/**'
            user-service:
              - 'apps/user-service/**'
              - 'packages/**'

      - name: Build matrix
        id: set-matrix
        run: |
          SERVICES="[]"

          if [ "${{ steps.filter.outputs.identity-service }}" = "true" ]; then
            SERVICES=$(echo $SERVICES | jq '. + ["identity-service"]')
          fi

          if [ "${{ steps.filter.outputs.analytics-service }}" = "true" ]; then
            SERVICES=$(echo $SERVICES | jq '. + ["analytics-service"]')
          fi

          if [ "${{ steps.filter.outputs.course-service }}" = "true" ]; then
            SERVICES=$(echo $SERVICES | jq '. + ["course-service"]')
          fi

          if [ "${{ steps.filter.outputs.exam-service }}" = "true" ]; then
            SERVICES=$(echo $SERVICES | jq '. + ["exam-service"]')
          fi

          if [ "${{ steps.filter.outputs.notification-service }}" = "true" ]; then
            SERVICES=$(echo $SERVICES | jq '. + ["notification-service"]')
          fi

          if [ "${{ steps.filter.outputs.question-service }}" = "true" ]; then
            SERVICES=$(echo $SERVICES | jq '. + ["question-service"]')
          fi

          if [ "${{ steps.filter.outputs.simulation-service }}" = "true" ]; then
            SERVICES=$(echo $SERVICES | jq '. + ["simulation-service"]')
          fi

          if [ "${{ steps.filter.outputs.user-service }}" = "true" ]; then
            SERVICES=$(echo $SERVICES | jq '. + ["user-service"]')
          fi

          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  # ==========================================
  # 3. BUILD & DEPLOY
  # ==========================================
  build-and-deploy:
    name: Build & Deploy Services
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    if: |
      needs.detect-changes.outputs.services != '[]' &&
      needs.detect-changes.outputs.services != '' &&
      needs.detect-changes.outputs.services != 'null'

    strategy:
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/nhactaohocbai/luyen-thi-lai-xe-${{ matrix.service }}:latest
            ghcr.io/nhactaohocbai/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Deploy to Render
        run: |
          RESPONSE=$(curl -sf "https://api.render.com/v1/services?name=luyen-thi-lai-xe-${{ matrix.service }}&limit=1" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}")

          SERVICE_ID=$(echo "$RESPONSE" | jq -r '.[0].service.id // empty')

          if [ -z "$SERVICE_ID" ]; then
            echo "❌ Không tìm thấy service: luyen-thi-lai-xe-${{ matrix.service }}"
            exit 1
          fi

          echo "✅ Found service ID: $SERVICE_ID"

          curl -sf -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}'

          echo "🚀 Deploy triggered cho ${{ matrix.service }}"

      - name: Build Summary
        if: always()
        run: |
          echo "## 🚀 ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`ghcr.io/nhactaohocbai/luyen-thi-lai-xe-${{ matrix.service }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
