name: Main Image Release

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "*.md"
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GHCR_OWNER: ${{ vars.GHCR_OWNER || github.repository_owner }}

jobs:
  quality-gate:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm exec turbo run prisma:generate

      - name: Format & Lint Check
        run: pnpm exec biome ci .

      - name: TypeScript Check
        run: pnpm exec turbo run check-types

      - name: Run Tests
        run: pnpm exec turbo run test

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    needs: quality-gate
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            all-services:
              - '.github/workflows/**'
              - 'Dockerfile.service'
              - 'Dockerfile.migration-runner'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'charts/**'
              - 'docker/**'
              - 'consul-seed-*.json'
            identity-service:
              - 'apps/identity-service/**'
              - 'packages/**'
            analytics-service:
              - 'apps/analytics-service/**'
              - 'packages/**'
            course-service:
              - 'apps/course-service/**'
              - 'packages/**'
            exam-service:
              - 'apps/exam-service/**'
              - 'packages/**'
            notification-service:
              - 'apps/notification-service/**'
              - 'packages/**'
            question-service:
              - 'apps/question-service/**'
              - 'packages/**'
            simulation-service:
              - 'apps/simulation-service/**'
              - 'packages/**'
            user-service:
              - 'apps/user-service/**'
              - 'packages/**'
            media-service:
              - 'apps/media-service/**'
              - 'packages/**'
            audit-service:
              - 'apps/audit-service/**'
              - 'packages/**'

      - name: Build matrix
        id: set-matrix
        shell: bash
        run: |
          CHANGED='${{ steps.filter.outputs.changes }}'
          ALL_SERVICES_JSON='["identity-service","analytics-service","course-service","exam-service","notification-service","question-service","simulation-service","user-service","media-service","audit-service"]'
          SERVICES="[]"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "Main push uses one immutable release tag for the whole Helm release -> build all production services"
            SERVICES="$ALL_SERVICES_JSON"
            printf 'services=%s\n' "$SERVICES" >> "$GITHUB_OUTPUT"
            echo "Final services to build: $SERVICES"
            exit 0
          fi

          if printf '%s\n' "$CHANGED" | jq -e 'index("all-services") != null' > /dev/null; then
            echo "DevOps/shared build inputs changed -> build all services"
            SERVICES="$ALL_SERVICES_JSON"
            printf 'services=%s\n' "$SERVICES" >> "$GITHUB_OUTPUT"
            echo "Final services to build: $SERVICES"
            exit 0
          fi

          while IFS= read -r SERVICE; do
            CHANGED_MATCH=$(printf '%s\n' "$CHANGED" | jq -rc --arg s "$SERVICE" 'map(select(. == $s)) | length')

            if [ "$CHANGED_MATCH" -gt "0" ]; then
              echo "$SERVICE: files changed -> build"
              SERVICES=$(printf '%s\n' "$SERVICES" | jq -rc --arg s "$SERVICE" '. + [$s]')
              continue
            fi

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://ghcr.io/v2/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-$SERVICE/manifests/latest")

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "$SERVICE: image missing on GHCR -> build"
              SERVICES=$(printf '%s\n' "$SERVICES" | jq -rc --arg s "$SERVICE" '. + [$s]')
            fi
          done < <(printf '%s\n' "$ALL_SERVICES_JSON" | jq -rc '.[]')

          printf 'services=%s\n' "$SERVICES" >> "$GITHUB_OUTPUT"
          echo "Final services to build: $SERVICES"

  build:
    name: Build Services
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      needs.detect-changes.outputs.services != '[]' &&
      needs.detect-changes.outputs.services != '' &&
      needs.detect-changes.outputs.services != 'null'

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    steps:
      - name: Start Timer
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "Docker build attempt $attempt/3 for ${{ matrix.service }}"

            if docker buildx build \
              --file "./apps/${{ matrix.service }}/Dockerfile" \
              --tag "ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-${{ matrix.service }}:latest" \
              --tag "ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}" \
              --cache-from "type=gha,scope=${{ matrix.service }}" \
              --cache-to "type=gha,mode=max,scope=${{ matrix.service }}" \
              --provenance=false \
              --load \
              .; then
              exit 0
            fi

            if [[ "$attempt" == "3" ]]; then
              echo "Docker build failed after 3 attempts"
              exit 1
            fi

            sleep_seconds=$((attempt * 30))
            echo "Docker build failed, retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Audit Docker Image with Trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}
          scanners: vuln
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Enforce Critical Vulnerability Gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}
          scanners: vuln
          format: table
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json
          dependency-snapshot: false
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}-${{ github.sha }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 90

      - name: Push Docker Image
        id: push-image
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REPO="ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-${{ matrix.service }}"
          IMAGE_TAG="${IMAGE_REPO}:${{ github.sha }}"

          docker push "$IMAGE_TAG"
          docker push "${IMAGE_REPO}:latest"

          DIGEST="$(docker buildx imagetools inspect "$IMAGE_TAG" --format '{{.Manifest.Digest}}')"
          IMAGE_REF="${IMAGE_REPO}@${DIGEST}"

          echo "image-ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved immutable image reference: ${IMAGE_REF}"

      - name: Install Cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign immutable image and attach SBOM attestation
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ steps.push-image.outputs.image-ref }}"

          retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi

              if [[ "$attempt" == "5" ]]; then
                echo "Command failed after 5 attempts: $*"
                return 1
              fi

              sleep_seconds=$((attempt * 20))
              echo "Command failed, retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
            done
          }

          retry cosign sign --yes "$IMAGE"
          retry cosign attest --yes --predicate "sbom-${{ matrix.service }}.spdx.json" --type spdxjson "$IMAGE"

      - name: Verify image signature
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.push-image.outputs.image-ref }}"

      - name: Get image size
        id: size
        if: github.ref == 'refs/heads/main'
        run: |
          docker pull ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-${{ matrix.service }}:latest 2>/dev/null || true
          SIZE=$(docker image inspect ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-${{ matrix.service }}:latest \
            --format='{{.Size}}' 2>/dev/null | awk '{printf "%.1f MB", $1/1024/1024}' || echo "N/A")
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Build Summary
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION="$(( (END_TIME - START_TIME) / 60 ))m $(( (END_TIME - START_TIME) % 60 ))s"

          STATUS="${{ job.status }}"
          if [[ "$STATUS" == "success" ]]; then ICON="✅"
          elif [[ "$STATUS" == "cancelled" ]]; then ICON="⏹️"
          else ICON="❌"
          fi

          SIZE="${{ steps.size.outputs.size }}"
          [ -z "$SIZE" ] && SIZE="N/A"

          {
            echo "## $ICON ${{ matrix.service }}"
            echo "| Property | Value |"
            echo "| :--- | :--- |"
            echo "| Status | $STATUS |"
            echo "| Build Duration | **$DURATION** |"
            echo "| Image Size | $SIZE |"
            echo "| SHA | \`${{ github.sha }}\` |"
            echo ""
            echo "---"
          } >> "$GITHUB_STEP_SUMMARY"

  build-migration-runner:
    name: Build Migration Runner
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Start Timer
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Migration Runner Image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --file Dockerfile.migration-runner \
            --tag ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-migration-runner:${{ github.sha }} \
            --tag ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-migration-runner:latest \
            --cache-from type=gha,scope=migration-runner \
            --cache-to type=gha,mode=max,scope=migration-runner \
            --provenance=false \
            --load \
            .

      - name: Audit Migration Runner with Trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-migration-runner:${{ github.sha }}
          scanners: vuln
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Enforce Migration Runner Critical Vulnerability Gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-migration-runner:${{ github.sha }}
          scanners: vuln
          format: table
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate Migration Runner SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-migration-runner:${{ github.sha }}
          format: spdx-json
          output-file: sbom-migration-runner.spdx.json
          dependency-snapshot: false
          upload-artifact: false
          upload-release-assets: false

      - name: Upload Migration Runner SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-migration-runner-${{ github.sha }}
          path: sbom-migration-runner.spdx.json
          retention-days: 90

      - name: Push Migration Runner Image
        id: push-migration-runner-image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REPO="ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-migration-runner"
          IMAGE_TAG="${IMAGE_REPO}:${{ github.sha }}"

          docker buildx build \
            --file Dockerfile.migration-runner \
            --tag "$IMAGE_TAG" \
            --tag "${IMAGE_REPO}:latest" \
            --cache-from type=gha,scope=migration-runner \
            --cache-to type=gha,mode=max,scope=migration-runner \
            --provenance=false \
            --push \
            .

          DIGEST="$(docker buildx imagetools inspect "$IMAGE_TAG" --format '{{.Manifest.Digest}}')"
          IMAGE_REF="${IMAGE_REPO}@${DIGEST}"

          echo "image-ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved immutable image reference: ${IMAGE_REF}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign immutable migration runner image and attach SBOM attestation
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ steps.push-migration-runner-image.outputs.image-ref }}"

          retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi

              if [[ "$attempt" == "5" ]]; then
                echo "Command failed after 5 attempts: $*"
                return 1
              fi

              sleep_seconds=$((attempt * 20))
              echo "Command failed, retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
            done
          }

          retry cosign sign --yes "$IMAGE"
          retry cosign attest --yes --predicate "sbom-migration-runner.spdx.json" --type spdxjson "$IMAGE"

      - name: Verify migration runner image signature
        shell: bash
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.push-migration-runner-image.outputs.image-ref }}"

      - name: Build Summary
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION="$(( (END_TIME - START_TIME) / 60 ))m $(( (END_TIME - START_TIME) % 60 ))s"
          {
            echo "## migration-runner"
            echo "| Property | Value |"
            echo "| :--- | :--- |"
            echo "| Status | ${{ job.status }} |"
            echo "| Build Duration | **$DURATION** |"
            echo "| SHA | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
