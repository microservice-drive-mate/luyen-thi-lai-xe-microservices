name: Rollback Release

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to roll back"
        required: true
        type: choice
        options:
          - staging
          - production
      helm_revision:
        description: "Helm revision to roll back to. Check with: helm history luyen-thi-lai-xe -n <namespace>"
        required: true
        type: string
      confirm_rollback:
        description: "Confirm rollback release"
        required: true
        type: boolean
        default: false
      run_smoke:
        description: "Run smoke test after rollback"
        required: true
        type: boolean
        default: true
      rollback_reason:
        description: "Rollback reason stored in the deployment event"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rollback-staging:
    name: Rollback Staging
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: inputs.target_environment == 'staging' && inputs.confirm_rollback == true
    environment:
      name: staging
    concurrency:
      group: deploy-azure-staging
      cancel-in-progress: false
    env:
      NAMESPACE: staging
      RELEASE_NAME: luyen-thi-lai-xe
      TARGET_REVISION: ${{ inputs.helm_revision }}
      AZURE_AKS_RESOURCE_GROUP: ${{ vars.AZURE_AKS_RESOURCE_GROUP }}
      AZURE_AKS_CLUSTER_NAME: ${{ vars.AZURE_AKS_CLUSTER_NAME }}
      API_HOST: ${{ vars.STAGING_API_HOST }}
      API_SCHEME: ${{ vars.STAGING_API_SCHEME }}
    steps:
      - uses: actions/checkout@v4

      - name: Mark rollback start
        shell: bash
        run: echo "DEPLOYMENT_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - uses: azure/setup-helm@v4

      - uses: azure/setup-kubectl@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate rollback inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$TARGET_REVISION" =~ ^[0-9]+$ ]]; then
            echo "helm_revision must be a numeric Helm revision: $TARGET_REVISION" >&2
            exit 1
          fi
          for var_name in AZURE_AKS_RESOURCE_GROUP AZURE_AKS_CLUSTER_NAME API_HOST; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Missing required value: ${var_name}" >&2
              exit 1
            fi
          done

      - name: Configure AKS credentials
        shell: bash
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "$AZURE_AKS_RESOURCE_GROUP" \
            --name "$AZURE_AKS_CLUSTER_NAME" \
            --overwrite-existing
          kubectl cluster-info

      - name: Capture current Helm revision
        shell: bash
        run: |
          set -euo pipefail
          helm history "$RELEASE_NAME" -n "$NAMESPACE"
          CURRENT_REVISION=$(helm history "$RELEASE_NAME" -n "$NAMESPACE" -o json \
            | jq -r 'map(select(.status == "deployed")) | last | .revision // ""')
          echo "CURRENT_REVISION=${CURRENT_REVISION}" >> "$GITHUB_ENV"
          echo "Rollback target revision: ${TARGET_REVISION}"

      - name: Rollback Helm release
        shell: bash
        run: |
          set -euo pipefail
          helm rollback "$RELEASE_NAME" "$TARGET_REVISION" \
            --namespace "$NAMESPACE" \
            --wait \
            --wait-for-jobs \
            --timeout 15m
          helm history "$RELEASE_NAME" -n "$NAMESPACE"

      - name: Verify rollout and smoke
        if: inputs.run_smoke == true
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status deployment -l app.kubernetes.io/component=app -n "$NAMESPACE" --timeout=10m
          API_SCHEME="${API_SCHEME:-http}"
          SMOKE_BASE_URL="${API_SCHEME}://${API_HOST}" bash scripts/k8s-smoke.sh

      - name: Record rollback deployment event
        if: always()
        shell: bash
        env:
          DEPLOYMENT_ENVIRONMENT: staging
          DEPLOYMENT_TYPE: helm-rollback
          DEPLOYMENT_TARGET: azure-aks
          DEPLOYMENT_RELEASE_NAME: luyen-thi-lai-xe
          DEPLOYMENT_NAMESPACE: staging
          DEPLOYMENT_IMAGE_TAG: helm-revision-${{ inputs.helm_revision }}
          DEPLOYMENT_GIT_SHA: ${{ github.sha }}
          DEPLOYMENT_STATUS: ${{ job.status }}
          DEPLOYMENT_SMOKE_STATUS: ${{ job.status }}
          ROLLBACK_REASON: ${{ inputs.rollback_reason }}
        run: |
          set -euo pipefail
          export DEPLOYMENT_ROLLBACK_OF="${CURRENT_REVISION:-unknown}"
          export DEPLOYMENT_METADATA_JSON
          DEPLOYMENT_METADATA_JSON=$(jq -nc \
            --arg targetRevision "$TARGET_REVISION" \
            --arg previousRevision "${CURRENT_REVISION:-unknown}" \
            --arg reason "${ROLLBACK_REASON:-}" \
            '{targetRevision: $targetRevision, previousRevision: $previousRevision, reason: $reason}')
          node scripts/devops-record-deployment.js

      - name: Upload rollback deployment event
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-event-rollback-staging-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/deployments/events/
          retention-days: 90

  rollback-production:
    name: Rollback Production
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: inputs.target_environment == 'production' && inputs.confirm_rollback == true
    environment:
      name: production
    concurrency:
      group: deploy-azure-production
      cancel-in-progress: false
    env:
      NAMESPACE: production
      RELEASE_NAME: luyen-thi-lai-xe
      TARGET_REVISION: ${{ inputs.helm_revision }}
      AZURE_AKS_RESOURCE_GROUP: ${{ vars.AZURE_AKS_RESOURCE_GROUP }}
      AZURE_AKS_CLUSTER_NAME: ${{ vars.AZURE_AKS_CLUSTER_NAME }}
      API_HOST: ${{ vars.PRODUCTION_API_HOST }}
      API_SCHEME: ${{ vars.PRODUCTION_API_SCHEME }}
    steps:
      - uses: actions/checkout@v4

      - name: Mark rollback start
        shell: bash
        run: echo "DEPLOYMENT_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - uses: azure/setup-helm@v4

      - uses: azure/setup-kubectl@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate rollback inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$TARGET_REVISION" =~ ^[0-9]+$ ]]; then
            echo "helm_revision must be a numeric Helm revision: $TARGET_REVISION" >&2
            exit 1
          fi
          for var_name in AZURE_AKS_RESOURCE_GROUP AZURE_AKS_CLUSTER_NAME API_HOST; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Missing required value: ${var_name}" >&2
              exit 1
            fi
          done

      - name: Configure AKS credentials
        shell: bash
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "$AZURE_AKS_RESOURCE_GROUP" \
            --name "$AZURE_AKS_CLUSTER_NAME" \
            --overwrite-existing
          kubectl cluster-info

      - name: Capture current Helm revision
        shell: bash
        run: |
          set -euo pipefail
          helm history "$RELEASE_NAME" -n "$NAMESPACE"
          CURRENT_REVISION=$(helm history "$RELEASE_NAME" -n "$NAMESPACE" -o json \
            | jq -r 'map(select(.status == "deployed")) | last | .revision // ""')
          echo "CURRENT_REVISION=${CURRENT_REVISION}" >> "$GITHUB_ENV"
          echo "Rollback target revision: ${TARGET_REVISION}"

      - name: Rollback Helm release
        shell: bash
        run: |
          set -euo pipefail
          helm rollback "$RELEASE_NAME" "$TARGET_REVISION" \
            --namespace "$NAMESPACE" \
            --wait \
            --wait-for-jobs \
            --timeout 15m
          helm history "$RELEASE_NAME" -n "$NAMESPACE"

      - name: Verify rollout and smoke
        if: inputs.run_smoke == true
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status deployment -l app.kubernetes.io/component=app -n "$NAMESPACE" --timeout=10m
          API_SCHEME="${API_SCHEME:-http}"
          SMOKE_BASE_URL="${API_SCHEME}://${API_HOST}" bash scripts/k8s-smoke.sh

      - name: Record rollback deployment event
        if: always()
        shell: bash
        env:
          DEPLOYMENT_ENVIRONMENT: production
          DEPLOYMENT_TYPE: helm-rollback
          DEPLOYMENT_TARGET: azure-aks
          DEPLOYMENT_RELEASE_NAME: luyen-thi-lai-xe
          DEPLOYMENT_NAMESPACE: production
          DEPLOYMENT_IMAGE_TAG: helm-revision-${{ inputs.helm_revision }}
          DEPLOYMENT_GIT_SHA: ${{ github.sha }}
          DEPLOYMENT_STATUS: ${{ job.status }}
          DEPLOYMENT_SMOKE_STATUS: ${{ job.status }}
          ROLLBACK_REASON: ${{ inputs.rollback_reason }}
        run: |
          set -euo pipefail
          export DEPLOYMENT_ROLLBACK_OF="${CURRENT_REVISION:-unknown}"
          export DEPLOYMENT_METADATA_JSON
          DEPLOYMENT_METADATA_JSON=$(jq -nc \
            --arg targetRevision "$TARGET_REVISION" \
            --arg previousRevision "${CURRENT_REVISION:-unknown}" \
            --arg reason "${ROLLBACK_REASON:-}" \
            '{targetRevision: $targetRevision, previousRevision: $previousRevision, reason: $reason}')
          node scripts/devops-record-deployment.js

      - name: Upload rollback deployment event
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-event-rollback-production-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/deployments/events/
          retention-days: 90
