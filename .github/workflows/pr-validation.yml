name: Pull Request Validation

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GHCR_OWNER: ${{ vars.GHCR_OWNER || github.repository_owner }}

jobs:
  quality-gate:
    uses: ./.github/workflows/reusable-quality-gate.yml

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    needs: quality-gate
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            all-services:
              - '.github/workflows/**'
              - 'Dockerfile.service'
              - 'Dockerfile.migration-runner'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'charts/**'
              - 'docker/**'
              - 'consul-seed-*.json'
            identity-service:
              - 'apps/identity-service/**'
              - 'packages/**'
            analytics-service:
              - 'apps/analytics-service/**'
              - 'packages/**'
            course-service:
              - 'apps/course-service/**'
              - 'packages/**'
            exam-service:
              - 'apps/exam-service/**'
              - 'packages/**'
            notification-service:
              - 'apps/notification-service/**'
              - 'packages/**'
            question-service:
              - 'apps/question-service/**'
              - 'packages/**'
            simulation-service:
              - 'apps/simulation-service/**'
              - 'packages/**'
            user-service:
              - 'apps/user-service/**'
              - 'packages/**'
            media-service:
              - 'apps/media-service/**'
              - 'packages/**'
            audit-service:
              - 'apps/audit-service/**'
              - 'packages/**'

      - name: Build matrix
        id: set-matrix
        shell: bash
        run: |
          CHANGED='${{ steps.filter.outputs.changes }}'
          ALL_SERVICES_JSON='["identity-service","analytics-service","course-service","exam-service","notification-service","question-service","simulation-service","user-service","media-service","audit-service"]'
          SERVICES="[]"

          if printf '%s\n' "$CHANGED" | jq -e 'index("all-services") != null' > /dev/null; then
            echo "DevOps/shared build inputs changed -> build all services"
            SERVICES="$ALL_SERVICES_JSON"
            printf 'services=%s\n' "$SERVICES" >> "$GITHUB_OUTPUT"
            echo "Final services to build: $SERVICES"
            exit 0
          fi

          while IFS= read -r SERVICE; do
            CHANGED_MATCH=$(printf '%s\n' "$CHANGED" | jq -rc --arg s "$SERVICE" 'map(select(. == $s)) | length')

            if [ "$CHANGED_MATCH" -gt "0" ]; then
              echo "$SERVICE: files changed -> build"
              SERVICES=$(printf '%s\n' "$SERVICES" | jq -rc --arg s "$SERVICE" '. + [$s]')
              continue
            fi

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://ghcr.io/v2/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-$SERVICE/manifests/latest")

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "$SERVICE: image missing on GHCR -> build"
              SERVICES=$(printf '%s\n' "$SERVICES" | jq -rc --arg s "$SERVICE" '. + [$s]')
            fi
          done < <(printf '%s\n' "$ALL_SERVICES_JSON" | jq -rc '.[]')

          printf 'services=%s\n' "$SERVICES" >> "$GITHUB_OUTPUT"
          echo "Final services to build: $SERVICES"

  label-pr:
    name: Label Pull Request
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - name: Create labels if not exist and add to PR
        uses: actions/github-script@v7
        with:
          script: |
            const services = ${{ needs.detect-changes.outputs.services }};
            if (!services || services.length === 0) return;

            for (const service of services) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: `service: ${service}`,
                  color: 'ededed',
                });
              } catch (e) {}
            }

            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: services.map((service) => `service: ${service}`),
            });

  build:
    name: Build and Scan Services
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      needs.detect-changes.outputs.services != '[]' &&
      needs.detect-changes.outputs.services != '' &&
      needs.detect-changes.outputs.services != 'null'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    steps:
      - name: Start Timer
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "Docker build attempt $attempt/3 for ${{ matrix.service }}"

            if docker buildx build \
              --file "./apps/${{ matrix.service }}/Dockerfile" \
              --tag "ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}" \
              --cache-from "type=gha,scope=${{ matrix.service }}" \
              --cache-to "type=gha,mode=max,scope=${{ matrix.service }}" \
              --provenance=false \
              --load \
              .; then
              exit 0
            fi

            if [[ "$attempt" == "3" ]]; then
              echo "Docker build failed after 3 attempts"
              exit 1
            fi

            sleep_seconds=$((attempt * 30))
            echo "Docker build failed, retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Audit Docker Image with Trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}
          scanners: vuln
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Enforce Critical Vulnerability Gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-${{ matrix.service }}:${{ github.sha }}
          scanners: vuln
          format: table
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Build Summary
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION="$(( (END_TIME - START_TIME) / 60 ))m $(( (END_TIME - START_TIME) % 60 ))s"

          {
            echo "## ${{ matrix.service }}"
            echo "| Property | Value |"
            echo "| :--- | :--- |"
            echo "| Status | ${{ job.status }} |"
            echo "| Build Duration | **$DURATION** |"
            echo "| Image Push | skipped for pull requests |"
            echo "| SHA | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  build-migration-runner:
    name: Build and Scan Migration Runner
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Start Timer
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Migration Runner Image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --file Dockerfile.migration-runner \
            --tag ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-migration-runner:${{ github.sha }} \
            --cache-from type=gha,scope=migration-runner \
            --cache-to type=gha,mode=max,scope=migration-runner \
            --provenance=false \
            --load \
            .

      - name: Audit Migration Runner with Trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-migration-runner:${{ github.sha }}
          scanners: vuln
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Enforce Migration Runner Critical Vulnerability Gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.GHCR_OWNER }}/luyen-thi-lai-xe-migration-runner:${{ github.sha }}
          scanners: vuln
          format: table
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Build Summary
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION="$(( (END_TIME - START_TIME) / 60 ))m $(( (END_TIME - START_TIME) % 60 ))s"
          {
            echo "## migration-runner"
            echo "| Property | Value |"
            echo "| :--- | :--- |"
            echo "| Status | ${{ job.status }} |"
            echo "| Build Duration | **$DURATION** |"
            echo "| Image Push | skipped for pull requests |"
            echo "| SHA | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  pr-validation-gate:
    name: PR Validation Gate
    needs:
      [quality-gate, detect-changes, label-pr, build, build-migration-runner]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Resolve overall PR status
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          node <<'NODE'
          const needs = JSON.parse(process.env.NEEDS_JSON);
          const optionalWhenSkipped = new Set(['build']);
          const failures = [];

          for (const [job, detail] of Object.entries(needs)) {
            if (detail.result === 'success') continue;
            if (detail.result === 'skipped' && optionalWhenSkipped.has(job)) continue;
            failures.push(`${job}: ${detail.result}`);
          }

          if (failures.length > 0) {
            console.error(`PR validation failed: ${failures.join(', ')}`);
            process.exit(1);
          }

          console.log('PR validation passed.');
          NODE
