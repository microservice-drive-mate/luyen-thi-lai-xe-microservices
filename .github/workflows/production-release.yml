name: Production Release

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - production
        default: production
      image_tag:
        description: "Immutable image tag to deploy, usually a Git SHA that passed Main Image Release"
        required: true
        type: string
      confirm_production:
        description: "Confirm this deploy targets production"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GHCR_OWNER: ${{ vars.GHCR_OWNER || github.repository_owner }}

jobs:
  deploy-production:
    name: Deploy Production Kubernetes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: inputs.confirm_production == true
    environment:
      name: ${{ inputs.target_environment }}
    concurrency:
      group: deploy-azure-production
      cancel-in-progress: false
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_AKS_RESOURCE_GROUP: ${{ vars.AZURE_AKS_RESOURCE_GROUP }}
      AZURE_AKS_CLUSTER_NAME: ${{ vars.AZURE_AKS_CLUSTER_NAME }}
      API_HOST: ${{ vars.PRODUCTION_API_HOST }}
      AUTH_HOST: ${{ vars.PRODUCTION_AUTH_HOST }}
      FRONTEND_ORIGIN: ${{ vars.PRODUCTION_FRONTEND_ORIGIN }}
      API_SCHEME: ${{ vars.PRODUCTION_API_SCHEME }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      POSTGRES_PASSWORD: ${{ secrets.PRODUCTION_POSTGRES_PASSWORD }}
      RABBITMQ_DEFAULT_PASS: ${{ secrets.PRODUCTION_RABBITMQ_PASSWORD }}
      RABBITMQ_ERLANG_COOKIE: ${{ secrets.PRODUCTION_RABBITMQ_ERLANG_COOKIE }}
      KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.PRODUCTION_KEYCLOAK_ADMIN_PASSWORD }}
      KEYCLOAK_CLIENT_SECRET: ${{ secrets.PRODUCTION_KEYCLOAK_CLIENT_SECRET }}
      STORAGE_ACCOUNT_NAME: ${{ secrets.PRODUCTION_STORAGE_ACCOUNT_NAME }}
      STORAGE_ACCOUNT_KEY: ${{ secrets.PRODUCTION_STORAGE_ACCOUNT_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Mark deployment start
        shell: bash
        run: echo "DEPLOYMENT_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - uses: azure/setup-helm@v4

      - uses: azure/setup-kubectl@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Kubernetes deployment inputs
        shell: bash
        run: |
          set -euo pipefail
          required_vars=(
            IMAGE_TAG
            AZURE_AKS_RESOURCE_GROUP
            AZURE_AKS_CLUSTER_NAME
            API_HOST
            AUTH_HOST
            FRONTEND_ORIGIN
            GHCR_PULL_USERNAME
            GHCR_PULL_TOKEN
            POSTGRES_PASSWORD
            RABBITMQ_DEFAULT_PASS
            RABBITMQ_ERLANG_COOKIE
            KEYCLOAK_ADMIN_PASSWORD
            KEYCLOAK_CLIENT_SECRET
            STORAGE_ACCOUNT_NAME
            STORAGE_ACCOUNT_KEY
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Missing required value: ${var_name}" >&2
              exit 1
            fi
          done

          echo "Repository: ${{ github.repository }}"
          echo "GHCR owner: $GHCR_OWNER"
          echo "Image tag: $IMAGE_TAG"

      - name: Configure AKS credentials
        shell: bash
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "$AZURE_AKS_RESOURCE_GROUP" \
            --name "$AZURE_AKS_CLUSTER_NAME" \
            --overwrite-existing
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Render Helm values
        shell: bash
        run: |
          set -euo pipefail
          export HELM_VALUES_FILE="$RUNNER_TEMP/production-values.json"
          API_SCHEME="${API_SCHEME:-http}"
          GATEWAY_PUBLIC_URL="${API_SCHEME}://${API_HOST}"
          KEYCLOAK_PUBLIC_URL="${API_SCHEME}://${AUTH_HOST}"
          export API_SCHEME GATEWAY_PUBLIC_URL KEYCLOAK_PUBLIC_URL

          node <<'NODE'
          const fs = require('node:fs');
          const env = process.env;
          const origins = [
            env.FRONTEND_ORIGIN,
            env.GATEWAY_PUBLIC_URL,
            env.KEYCLOAK_PUBLIC_URL,
          ].flatMap((value) => String(value || '').split(','))
            .map((value) => value.trim())
            .filter(Boolean);

          const values = {
            global: {
              imageTag: env.IMAGE_TAG,
              imageRegistry: `ghcr.io/${env.GHCR_OWNER}`,
              nodeEnv: 'production',
              storageClassName: 'managed-csi',
            },
            migration: { imageTag: env.IMAGE_TAG },
            imagePullSecret: {
              enabled: true,
              username: env.GHCR_PULL_USERNAME,
              token: env.GHCR_PULL_TOKEN,
            },
            ingress: {
              className: 'nginx',
              apiHost: env.API_HOST,
              authHost: env.AUTH_HOST,
              annotations: {
                'nginx.ingress.kubernetes.io/proxy-body-size': '100m',
              },
              tls: {
                enabled: env.API_SCHEME === 'https',
                secretName: 'luyen-thi-lai-xe-tls',
              },
            },
            config: {
              frontendOrigin: env.FRONTEND_ORIGIN,
              gatewayPublicUrl: env.GATEWAY_PUBLIC_URL,
              keycloakPublicUrl: env.KEYCLOAK_PUBLIC_URL,
              corsOrigins: [...new Set(origins)],
            },
            seed: {
              enabled: false,
            },
            secrets: {
              postgresPassword: env.POSTGRES_PASSWORD,
              rabbitmqPassword: env.RABBITMQ_DEFAULT_PASS,
              rabbitmqErlangCookie: env.RABBITMQ_ERLANG_COOKIE,
              keycloakAdminPassword: env.KEYCLOAK_ADMIN_PASSWORD,
              keycloakClientSecret: env.KEYCLOAK_CLIENT_SECRET,
              storageAccountName: env.STORAGE_ACCOUNT_NAME || '',
              storageAccountKey: env.STORAGE_ACCOUNT_KEY || '',
            },
          };

          fs.writeFileSync(env.HELM_VALUES_FILE, JSON.stringify(values, null, 2));
          NODE

      - name: Deploy Helm release
        shell: bash
        run: |
          set -euo pipefail
          helm lint charts/luyen-thi-lai-xe -f "$RUNNER_TEMP/production-values.json"
          helm upgrade --install luyen-thi-lai-xe charts/luyen-thi-lai-xe \
            --namespace production \
            --create-namespace \
            --wait \
            --wait-for-jobs \
            --timeout 25m \
            -f "$RUNNER_TEMP/production-values.json"

      - name: Debug deployment failure
        if: failure()
        shell: bash
        run: |
          set -uo pipefail
          echo "========== HELM RELEASE STATUS =========="
          helm list -n production || true
          echo ""
          echo "========== HELM HISTORY =========="
          helm history luyen-thi-lai-xe -n production || true
          echo ""
          echo "========== ALL PODS =========="
          kubectl get pods -n production -o wide || true
          echo ""
          echo "========== NON-RUNNING POD DEBUG =========="
          for pod in $(kubectl get pods -n production --field-selector=status.phase!=Running,status.phase!=Succeeded --no-headers -o custom-columns=":metadata.name" 2>/dev/null); do
            echo "--- Describing non-running pod: $pod ---"
            kubectl describe pod "$pod" -n production 2>/dev/null || true
            echo ""
            echo "--- Current logs: $pod ---"
            kubectl logs "$pod" -n production --all-containers --tail=120 2>/dev/null || true
            echo ""
            echo "--- Previous logs: $pod ---"
            kubectl logs "$pod" -n production --all-containers --previous --tail=120 2>/dev/null || true
            echo ""
          done
          echo ""
          echo "========== EVENTS (last 50) =========="
          kubectl get events -n production --sort-by='.metadata.creationTimestamp' 2>/dev/null | tail -50 || true

      - name: Verify rollout and smoke
        shell: bash
        run: |
          set -euo pipefail
          kubectl wait --for=condition=complete job -l app.kubernetes.io/component=consul-seed -n production --timeout=10m
          kubectl wait --for=condition=complete job -l app.kubernetes.io/component=migration -n production --timeout=10m
          kubectl rollout status deployment -l app.kubernetes.io/component=app -n production --timeout=10m
          kubectl get jobs -n production
          API_SCHEME="${API_SCHEME:-http}"
          SMOKE_BASE_URL="${API_SCHEME}://${API_HOST}" bash scripts/k8s-smoke.sh

      - name: Record deployment event
        if: always()
        env:
          DEPLOYMENT_ENVIRONMENT: production
          DEPLOYMENT_TYPE: helm
          DEPLOYMENT_TARGET: azure-aks
          DEPLOYMENT_RELEASE_NAME: luyen-thi-lai-xe
          DEPLOYMENT_NAMESPACE: production
          DEPLOYMENT_IMAGE_TAG: ${{ inputs.image_tag }}
          DEPLOYMENT_GIT_SHA: ${{ inputs.image_tag }}
          DEPLOYMENT_STATUS: ${{ job.status }}
          DEPLOYMENT_SMOKE_STATUS: ${{ job.status }}
        run: node scripts/devops-record-deployment.js

      - name: Upload deployment event
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-event-production-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/deployments/events/
          retention-days: 90
