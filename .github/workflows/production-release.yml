name: Production Release

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Immutable image tag to deploy, usually a Git SHA that passed Main Image Release"
        required: true
        type: string
      confirm_production:
        description: "Confirm this deploy targets production"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: read

jobs:
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: inputs.confirm_production == true
    environment: production
    env:
      DEPLOY_ENV: production
      DEPLOY_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
      GHCR_OWNER: nhactaohocbai
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      IMAGE_TAG: ${{ inputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment inputs
        shell: bash
        run: |
          set -euo pipefail
          required_vars=(
            DEPLOY_HOST
            DEPLOY_USER
            DEPLOY_PATH
            GHCR_OWNER
            GHCR_USERNAME
            GHCR_TOKEN
            IMAGE_TAG
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Missing required value: ${var_name}" >&2
              exit 1
            fi
          done

      - name: Configure SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${SSH_PRIVATE_KEY:-}" ]]; then
            echo "Missing required value: PRODUCTION_SSH_PRIVATE_KEY" >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy compose stack
        shell: bash
        run: bash scripts/deploy-prod.sh
