name: Production Release

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - production
        default: production
      image_tag:
        description: "Immutable image tag to deploy, usually a Git SHA that passed Main Image Release"
        required: true
        type: string
      confirm_production:
        description: "Confirm this deploy targets production"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GHCR_OWNER: ${{ vars.GHCR_OWNER || github.repository_owner }}

jobs:
  deploy-production:
    name: Deploy Production Kubernetes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: inputs.confirm_production == true
    environment:
      name: ${{ inputs.target_environment }}
    concurrency:
      group: deploy-azure-production
      cancel-in-progress: false
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_AKS_RESOURCE_GROUP: ${{ vars.AZURE_AKS_RESOURCE_GROUP }}
      AZURE_AKS_CLUSTER_NAME: ${{ vars.AZURE_AKS_CLUSTER_NAME }}
      API_HOST: ${{ vars.PRODUCTION_API_HOST }}
      AUTH_HOST: ${{ vars.PRODUCTION_AUTH_HOST }}
      FRONTEND_ORIGIN: ${{ vars.PRODUCTION_FRONTEND_ORIGIN }}
      API_SCHEME: ${{ vars.PRODUCTION_API_SCHEME }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      POSTGRES_PASSWORD: ${{ secrets.PRODUCTION_POSTGRES_PASSWORD }}
      RABBITMQ_DEFAULT_PASS: ${{ secrets.PRODUCTION_RABBITMQ_PASSWORD }}
      RABBITMQ_ERLANG_COOKIE: ${{ secrets.PRODUCTION_RABBITMQ_ERLANG_COOKIE }}
      KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.PRODUCTION_KEYCLOAK_ADMIN_PASSWORD }}
      KEYCLOAK_CLIENT_SECRET: ${{ secrets.PRODUCTION_KEYCLOAK_CLIENT_SECRET }}
      STORAGE_ACCOUNT_NAME: ${{ secrets.PRODUCTION_STORAGE_ACCOUNT_NAME }}
      STORAGE_ACCOUNT_KEY: ${{ secrets.PRODUCTION_STORAGE_ACCOUNT_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark deployment start
        shell: bash
        run: echo "DEPLOYMENT_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - uses: azure/setup-helm@v4

      - uses: azure/setup-kubectl@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Kubernetes deployment inputs
        shell: bash
        run: |
          set -euo pipefail
          required_vars=(
            IMAGE_TAG
            AZURE_AKS_RESOURCE_GROUP
            AZURE_AKS_CLUSTER_NAME
            API_HOST
            AUTH_HOST
            FRONTEND_ORIGIN
            GHCR_PULL_USERNAME
            GHCR_PULL_TOKEN
            POSTGRES_PASSWORD
            RABBITMQ_DEFAULT_PASS
            RABBITMQ_ERLANG_COOKIE
            KEYCLOAK_ADMIN_PASSWORD
            KEYCLOAK_CLIENT_SECRET
            STORAGE_ACCOUNT_NAME
            STORAGE_ACCOUNT_KEY
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Missing required value: ${var_name}" >&2
              exit 1
            fi
          done

          echo "Repository: ${{ github.repository }}"
          echo "GHCR owner: $GHCR_OWNER"
          echo "Image tag: $IMAGE_TAG"
          echo "Azure resource group: $AZURE_AKS_RESOURCE_GROUP"
          echo "Azure AKS cluster: $AZURE_AKS_CLUSTER_NAME"
          echo "Kubernetes namespace: production"

      - name: Normalize image tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$IMAGE_TAG" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
            if FULL_SHA=$(git rev-parse --verify "${IMAGE_TAG}^{commit}" 2>/dev/null); then
              if [[ "$FULL_SHA" != "$IMAGE_TAG" ]]; then
                echo "Resolved image_tag '$IMAGE_TAG' to full Git SHA '$FULL_SHA'."
                echo "IMAGE_TAG=$FULL_SHA" >> "$GITHUB_ENV"
              else
                echo "image_tag is already a full Git SHA: $IMAGE_TAG"
              fi
            elif [[ ${#IMAGE_TAG} -lt 40 ]]; then
              echo "Short image_tag '$IMAGE_TAG' could not be resolved in git history." >&2
              echo "Use the full 40-character Git SHA built by Main Image Release." >&2
              exit 1
            fi
          fi

      - name: Validate GHCR images
        shell: bash
        run: |
          set -euo pipefail
          echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_PULL_USERNAME" --password-stdin

          images=(
            luyen-thi-lai-xe-identity-service
            luyen-thi-lai-xe-user-service
            luyen-thi-lai-xe-exam-service
            luyen-thi-lai-xe-course-service
            luyen-thi-lai-xe-question-service
            luyen-thi-lai-xe-notification-service
            luyen-thi-lai-xe-analytics-service
            luyen-thi-lai-xe-simulation-service
            luyen-thi-lai-xe-media-service
            luyen-thi-lai-xe-audit-service
            luyen-thi-lai-xe-migration-runner
          )

          missing=0
          auth_failed=0
          for image in "${images[@]}"; do
            ref="ghcr.io/${GHCR_OWNER}/${image}:${IMAGE_TAG}"
            echo "Checking $ref"
            error_file="$(mktemp)"
            if docker manifest inspect "$ref" >/dev/null 2>"$error_file"; then
              echo "Found GHCR image: $ref"
            else
              error_message="$(tr '\n' ' ' < "$error_file" | sed 's/[[:space:]]\+/ /g')"
              if echo "$error_message" | grep -Eiq "unauthorized|denied|forbidden|authentication required|insufficient_scope"; then
                echo "GHCR authorization failed for: $ref" >&2
                echo "Docker error: $error_message" >&2
                auth_failed=1
              else
                echo "Missing GHCR image: $ref" >&2
                echo "Docker error: ${error_message:-unknown error}" >&2
                missing=1
              fi
            fi
            rm -f "$error_file"
          done

          docker logout ghcr.io >/dev/null 2>&1 || true

          if [[ "$auth_failed" -ne 0 ]]; then
            echo "GHCR login succeeded, but the token/user cannot read one or more private package manifests." >&2
            echo "Grant the repository Actions access to the packages, or update GHCR_PULL_USERNAME/GHCR_PULL_TOKEN with read:packages access to GHCR owner '$GHCR_OWNER'." >&2
            exit 1
          fi

          if [[ "$missing" -ne 0 ]]; then
            echo "One or more required images do not exist for IMAGE_TAG=$IMAGE_TAG." >&2
            echo "Checked GHCR owner: $GHCR_OWNER." >&2
            echo "Make sure Main Image Release completed successfully for this exact commit before production deploy." >&2
            echo "Use the same immutable SHA that already passed staging smoke tests." >&2
            exit 1
          fi

      - name: Configure AKS credentials
        shell: bash
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "$AZURE_AKS_RESOURCE_GROUP" \
            --name "$AZURE_AKS_CLUSTER_NAME" \
            --overwrite-existing
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Render Helm values
        shell: bash
        run: |
          set -euo pipefail
          export HELM_VALUES_FILE="$RUNNER_TEMP/production-values.json"
          API_SCHEME="${API_SCHEME:-http}"
          GATEWAY_PUBLIC_URL="${API_SCHEME}://${API_HOST}"
          KEYCLOAK_PUBLIC_URL="${API_SCHEME}://${AUTH_HOST}"
          export API_SCHEME GATEWAY_PUBLIC_URL KEYCLOAK_PUBLIC_URL

          node <<'NODE'
          const fs = require('node:fs');
          const env = process.env;
          const origins = [
            env.FRONTEND_ORIGIN,
            env.GATEWAY_PUBLIC_URL,
            env.KEYCLOAK_PUBLIC_URL,
          ].flatMap((value) => String(value || '').split(','))
            .map((value) => value.trim())
            .filter(Boolean);

          const values = {
            global: {
              imageTag: env.IMAGE_TAG,
              imageRegistry: `ghcr.io/${env.GHCR_OWNER}`,
              nodeEnv: 'production',
              storageClassName: 'managed-csi',
            },
            imagePullSecret: {
              enabled: true,
              username: env.GHCR_PULL_USERNAME,
              token: env.GHCR_PULL_TOKEN,
            },
            ingress: {
              className: 'nginx',
              apiHost: env.API_HOST,
              authHost: env.AUTH_HOST,
              annotations: {
                'nginx.ingress.kubernetes.io/proxy-body-size': '100m',
              },
              tls: {
                enabled: env.API_SCHEME === 'https',
                secretName: 'luyen-thi-lai-xe-tls',
              },
            },
            config: {
              frontendOrigin: env.FRONTEND_ORIGIN,
              gatewayPublicUrl: env.GATEWAY_PUBLIC_URL,
              keycloakPublicUrl: env.KEYCLOAK_PUBLIC_URL,
              corsOrigins: [...new Set(origins)],
            },
            tracing: {
              enabled: false,
            },
            appDefaults: {
              replicaCount: 1,
              resources: {
                requests: { cpu: '50m', memory: '128Mi' },
                limits: { cpu: '500m', memory: '512Mi' },
              },
              hpa: { enabled: false },
            },
            seed: {
              enabled: false,
              resources: {
                requests: { cpu: '100m', memory: '256Mi' },
                limits: { cpu: '500m', memory: '768Mi' },
              },
            },
            secrets: {
              postgresPassword: env.POSTGRES_PASSWORD,
              rabbitmqPassword: env.RABBITMQ_DEFAULT_PASS,
              rabbitmqErlangCookie: env.RABBITMQ_ERLANG_COOKIE,
              keycloakAdminPassword: env.KEYCLOAK_ADMIN_PASSWORD,
              keycloakClientSecret: env.KEYCLOAK_CLIENT_SECRET,
              storageAccountName: env.STORAGE_ACCOUNT_NAME || '',
              storageAccountKey: env.STORAGE_ACCOUNT_KEY || '',
              storageContainerName: 'media',
            },
            postgres: {
              storage: '8Gi',
              resources: {
                requests: { cpu: '250m', memory: '512Mi' },
                limits: { cpu: '1', memory: '2Gi' },
              },
            },
            rabbitmq: {
              storage: '1Gi',
              resources: {
                requests: { cpu: '100m', memory: '256Mi' },
                limits: { cpu: '500m', memory: '768Mi' },
              },
            },
            redis: {
              storage: '1Gi',
              resources: {
                requests: { cpu: '50m', memory: '128Mi' },
                limits: { cpu: '250m', memory: '256Mi' },
              },
            },
            consul: {
              storage: '1Gi',
              resources: {
                requests: { cpu: '50m', memory: '128Mi' },
                limits: { cpu: '250m', memory: '256Mi' },
              },
            },
            keycloak: {
              replicas: 1,
              resources: {
                requests: { cpu: '250m', memory: '512Mi' },
                limits: { cpu: '1', memory: '1Gi' },
              },
            },
            kong: {
              replicas: 1,
              resources: {
                requests: { cpu: '100m', memory: '256Mi' },
                limits: { cpu: '500m', memory: '512Mi' },
              },
            },
            migration: {
              imageTag: env.IMAGE_TAG,
              resources: {
                requests: { cpu: '100m', memory: '256Mi' },
                limits: { cpu: '500m', memory: '768Mi' },
              },
            },
            services: [
              {
                name: 'identity-service',
                image: 'luyen-thi-lai-xe-identity-service',
                dbName: 'identity_db',
                usesRedis: true,
                hpa: { enabled: false },
                routes: [
                  { name: 'identity-route', paths: ['/auth'], stripPath: true },
                  { name: 'identity-admin-route', paths: ['/admin'], stripPath: false },
                  { name: 'identity-swagger-route', paths: ['/identity-service'], stripPath: true },
                ],
              },
              {
                name: 'user-service',
                image: 'luyen-thi-lai-xe-user-service',
                dbName: 'user_db',
                routes: [
                  { name: 'user-route', paths: ['/users'], stripPath: false },
                  { name: 'user-admin-route', paths: ['/admin/users'], stripPath: false },
                  { name: 'user-swagger-route', paths: ['/user-service'], stripPath: true },
                ],
              },
              {
                name: 'exam-service',
                image: 'luyen-thi-lai-xe-exam-service',
                dbName: 'exam_db',
                hpa: { enabled: false },
                routes: [
                  { name: 'exam-route', paths: ['/exams'], stripPath: false },
                  { name: 'exam-admin-route', paths: ['/admin/exams'], stripPath: false },
                  { name: 'exam-swagger-route', paths: ['/exam-service'], stripPath: true },
                ],
              },
              {
                name: 'course-service',
                image: 'luyen-thi-lai-xe-course-service',
                dbName: 'course_db',
                usesRedis: true,
                hpa: { enabled: false },
                routes: [
                  { name: 'course-route', paths: ['/courses', '/enrollments'], stripPath: false },
                  { name: 'course-admin-route', paths: ['/admin/courses', '/admin/enrollments'], stripPath: false },
                  { name: 'course-swagger-route', paths: ['/course-service'], stripPath: true },
                ],
              },
              {
                name: 'question-service',
                image: 'luyen-thi-lai-xe-question-service',
                dbName: 'question_db',
                routes: [
                  { name: 'question-admin-route', paths: ['/admin/questions'], stripPath: false },
                  { name: 'question-swagger-route', paths: ['/question-service'], stripPath: true },
                ],
              },
              {
                name: 'notification-service',
                image: 'luyen-thi-lai-xe-notification-service',
                dbName: 'notification_db',
                usesRedis: true,
                routes: [
                  { name: 'notification-route', paths: ['/notifications'], stripPath: false },
                  { name: 'notification-swagger-route', paths: ['/notification-service'], stripPath: true },
                ],
              },
              {
                name: 'analytics-service',
                image: 'luyen-thi-lai-xe-analytics-service',
                dbName: 'analytics_db',
                usesRedis: true,
                hpa: { enabled: false },
                routes: [
                  { name: 'analytics-route', paths: ['/analytics'], stripPath: false },
                  { name: 'analytics-admin-route', paths: ['/admin/analytics'], stripPath: false },
                  { name: 'analytics-swagger-route', paths: ['/analytics-service'], stripPath: true },
                ],
              },
              {
                name: 'simulation-service',
                image: 'luyen-thi-lai-xe-simulation-service',
                dbName: 'simulation_db',
                usesRedis: true,
                hpa: { enabled: false },
                routes: [
                  { name: 'simulation-route', paths: ['/simulation'], stripPath: false },
                  { name: 'simulation-swagger-route', paths: ['/simulation-service'], stripPath: true },
                ],
              },
              {
                name: 'media-service',
                image: 'luyen-thi-lai-xe-media-service',
                dbName: 'media_db',
                resources: {
                  requests: { cpu: '75m', memory: '192Mi' },
                  limits: { cpu: '750m', memory: '1Gi' },
                },
                routes: [
                  { name: 'media-route', paths: ['/media'], stripPath: false },
                  { name: 'media-admin-route', paths: ['/admin/media'], stripPath: false },
                  { name: 'media-swagger-route', paths: ['/media-service'], stripPath: true },
                ],
              },
              {
                name: 'audit-service',
                image: 'luyen-thi-lai-xe-audit-service',
                dbName: 'audit_db',
                routes: [
                  { name: 'audit-admin-route', paths: ['/admin/audit-logs'], stripPath: false },
                  { name: 'audit-swagger-route', paths: ['/audit-service'], stripPath: true },
                ],
              },
            ],
          };

          fs.writeFileSync(env.HELM_VALUES_FILE, JSON.stringify(values, null, 2));
          NODE

      - name: Cleanup old Helm jobs
        shell: bash
        run: |
          set -euo pipefail
          kubectl delete jobs -n production -l app.kubernetes.io/instance=luyen-thi-lai-xe --ignore-not-found

      - name: Deploy Helm release
        shell: bash
        run: |
          set -euo pipefail
          helm lint charts/luyen-thi-lai-xe -f "$RUNNER_TEMP/production-values.json"
          helm upgrade --install luyen-thi-lai-xe charts/luyen-thi-lai-xe \
            --namespace production \
            --create-namespace \
            --wait \
            --wait-for-jobs \
            --timeout 25m \
            -f "$RUNNER_TEMP/production-values.json"

      - name: Debug deployment failure
        if: failure()
        shell: bash
        run: |
          set -uo pipefail
          echo "========== HELM RELEASE STATUS =========="
          helm list -n production || true
          echo ""
          echo "========== HELM HISTORY =========="
          helm history luyen-thi-lai-xe -n production || true
          echo ""
          echo "========== ALL PODS =========="
          kubectl get pods -n production -o wide || true
          echo ""
          echo "========== NON-RUNNING POD DEBUG =========="
          for pod in $(kubectl get pods -n production --field-selector=status.phase!=Running,status.phase!=Succeeded --no-headers -o custom-columns=":metadata.name" 2>/dev/null); do
            echo "--- Describing non-running pod: $pod ---"
            kubectl describe pod "$pod" -n production 2>/dev/null || true
            echo ""
            echo "--- Current logs: $pod ---"
            kubectl logs "$pod" -n production --all-containers --tail=120 2>/dev/null || true
            echo ""
            echo "--- Previous logs: $pod ---"
            kubectl logs "$pod" -n production --all-containers --previous --tail=120 2>/dev/null || true
            echo ""
          done
          echo ""
          echo "========== EVENTS (last 50) =========="
          kubectl get events -n production --sort-by='.metadata.creationTimestamp' 2>/dev/null | tail -50 || true

      - name: Verify rollout and smoke
        shell: bash
        run: |
          set -euo pipefail
          kubectl wait --for=condition=complete job -l app.kubernetes.io/component=consul-seed -n production --timeout=10m
          kubectl wait --for=condition=complete job -l app.kubernetes.io/component=migration -n production --timeout=10m
          kubectl rollout status deployment -l app.kubernetes.io/component=app -n production --timeout=10m
          kubectl get deploy,svc,ingress,job -n production
          API_SCHEME="${API_SCHEME:-http}"
          SMOKE_BASE_URL="${API_SCHEME}://${API_HOST}" bash scripts/k8s-smoke.sh

      - name: Record deployment event
        if: always()
        env:
          DEPLOYMENT_ENVIRONMENT: production
          DEPLOYMENT_TYPE: helm
          DEPLOYMENT_TARGET: azure-aks
          DEPLOYMENT_RELEASE_NAME: luyen-thi-lai-xe
          DEPLOYMENT_NAMESPACE: production
          DEPLOYMENT_STATUS: ${{ job.status }}
          DEPLOYMENT_SMOKE_STATUS: ${{ job.status }}
        run: |
          DEPLOYMENT_IMAGE_TAG="$IMAGE_TAG" \
          DEPLOYMENT_GIT_SHA="$IMAGE_TAG" \
          node scripts/devops-record-deployment.js

      - name: Upload deployment event
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-event-production-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/deployments/events/
          retention-days: 90
