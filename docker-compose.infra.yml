# Chỉ chứa infrastructure — dùng khi chạy services local (hybrid dev mode)
# Khởi động: docker compose -f docker-compose.infra.yml up -d

services:
  # ── Databases ──────────────────────────────────────────────
  db-identity:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - db_identity_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d identity_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  db-user:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5433:5432"
    volumes:
      - db_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  db-exam:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: exam_db
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5434:5432"
    volumes:
      - db_exam_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d exam_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s
  db-course:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: course_db
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5435:5432"
    volumes:
      - db_course_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d course_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  db-question:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: question_db
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5436:5432"
    volumes:
      - db_question_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d question_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  db-notification:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5437:5432"
    volumes:
      - db_notification_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  db-analytics:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: analytics_db
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5438:5432"
    volumes:
      - db_analytics_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d analytics_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  db-simulation:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: simulation_db
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5439:5432"
    volumes:
      - db_simulation_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d simulation_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  db-media:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: media_db
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5440:5432"
    volumes:
      - db_media_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d media_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  db-audit:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: audit_db
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5441:5432"
    volumes:
      - db_audit_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d audit_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s
  # ── Message Broker ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    command: sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-luyen-thi-lai-xe-rabbitmq-cookie}
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"

  # ── Token Blacklist Cache ───────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  # ── Config Server ──────────────────────────────────────────
  consul:
    image: hashicorp/consul:1.19
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    ports:
      - "8500:8500"
      - "8600:8600"
      - "8600:8600/udp"
    environment:
      CONSUL_BIND_INTERFACE: eth0
    volumes:
      - consul_data:/consul/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 10s
      timeout: 5s
      retries: 5

  consul-init:
    image: curlimages/curl:latest
    volumes:
      - ./docker/consul/init.sh:/consul/init.sh:ro
    environment:
      CONSUL_URL: http://consul:8500
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
      KEYCLOAK_TIMEOUT_MS: ${KEYCLOAK_TIMEOUT_MS:-10000}
      STORAGE_ACCOUNT_NAME: ${STORAGE_ACCOUNT_NAME:-}
      STORAGE_ACCOUNT_KEY: ${STORAGE_ACCOUNT_KEY:-}
      STORAGE_CONTAINER_NAME: ${STORAGE_CONTAINER_NAME:-media}
      STORAGE_PRESIGNED_URL_EXPIRY: ${STORAGE_PRESIGNED_URL_EXPIRY:-3600}
      GATEWAY_PUBLIC_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8000}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      KONG_CORS_ORIGINS: ${KONG_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
    depends_on:
      consul:
        condition: service_healthy
    command: sh /consul/init.sh
    restart: "no"

  # ── Identity Provider ──────────────────────────────────────
  db-keycloak:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak_db}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-password}
    volumes:
      - db_keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak_db}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 45s

  postgres-backup:
    image: postgres:15-alpine
    volumes:
      - ./docker/backup/postgres-daily-backup.sh:/backup/postgres-daily-backup.sh:ro
      - ./backups:/backups
    environment:
      NODE_ENV: development-local
      BACKUP_ROOT: /backups/postgres
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_WEEKLY_RETENTION_WEEKS: ${BACKUP_WEEKLY_RETENTION_WEEKS:-4}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      IDENTITY_DB_NAME: identity_db
      USER_DB_NAME: user_db
      EXAM_DB_NAME: exam_db
      COURSE_DB_NAME: course_db
      QUESTION_DB_NAME: question_db
      NOTIFICATION_DB_NAME: notification_db
      ANALYTICS_DB_NAME: analytics_db
      SIMULATION_DB_NAME: simulation_db
      MEDIA_DB_NAME: media_db
      AUDIT_DB_NAME: audit_db
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME:-keycloak_db}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-password}
    depends_on:
      db-identity:
        condition: service_healthy
      db-user:
        condition: service_healthy
      db-exam:
        condition: service_healthy
      db-course:
        condition: service_healthy
      db-question:
        condition: service_healthy
      db-notification:
        condition: service_healthy
      db-analytics:
        condition: service_healthy
      db-simulation:
        condition: service_healthy
      db-media:
        condition: service_healthy
      db-audit:
        condition: service_healthy
      db-keycloak:
        condition: service_healthy
    command: sh /backup/postgres-daily-backup.sh
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    # --import-realm: tự động import tất cả *.json trong /opt/keycloak/data/import/
    # khi realm chưa tồn tại (idempotent – restart an toàn)
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-keycloak:5432/${KEYCLOAK_DB_NAME:-keycloak_db}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-password}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_URL: "http://localhost:8080"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      db-keycloak:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  # ── API Gateway (trỏ vào localhost của máy host) ───────────
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  keycloak-smtp-config:
    image: quay.io/keycloak/keycloak:24.0
    volumes:
      - ./docker/keycloak/configure-smtp.sh:/opt/keycloak/configure-smtp.sh:ro
    entrypoint: ["/bin/sh", "/opt/keycloak/configure-smtp.sh"]
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: luyen-thi-lai-xe-realm
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_SMTP_HOST: ${KEYCLOAK_SMTP_HOST:-mailpit}
      KEYCLOAK_SMTP_PORT: ${KEYCLOAK_SMTP_PORT:-1025}
      KEYCLOAK_SMTP_FROM: ${KEYCLOAK_SMTP_FROM:-no-reply@luyen-thi-lai-xe.local}
      KEYCLOAK_SMTP_FROM_DISPLAY_NAME: ${KEYCLOAK_SMTP_FROM_DISPLAY_NAME:-Luyen Thi Lai Xe}
      KEYCLOAK_SMTP_REPLY_TO: ${KEYCLOAK_SMTP_REPLY_TO:-no-reply@luyen-thi-lai-xe.local}
      KEYCLOAK_SMTP_REPLY_TO_DISPLAY_NAME: ${KEYCLOAK_SMTP_REPLY_TO_DISPLAY_NAME:-Luyen Thi Lai Xe}
      KEYCLOAK_SMTP_AUTH: ${KEYCLOAK_SMTP_AUTH:-false}
      KEYCLOAK_SMTP_USER: ${KEYCLOAK_SMTP_USER:-}
      KEYCLOAK_SMTP_PASSWORD: ${KEYCLOAK_SMTP_PASSWORD:-}
      KEYCLOAK_SMTP_SSL: ${KEYCLOAK_SMTP_SSL:-false}
      KEYCLOAK_SMTP_STARTTLS: ${KEYCLOAK_SMTP_STARTTLS:-false}
    depends_on:
      keycloak:
        condition: service_healthy
      mailpit:
        condition: service_started
    restart: "no"

  keycloak-backup:
    image: quay.io/keycloak/keycloak:24.0
    volumes:
      - ./docker/keycloak/keycloak-daily-export.sh:/opt/keycloak/keycloak-daily-export.sh:ro
      - ./backups:/backups
    entrypoint: ["/bin/sh", "/opt/keycloak/keycloak-daily-export.sh"]
    environment:
      NODE_ENV: development-local
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: luyen-thi-lai-xe-realm
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_EXPORT_ROOT: /backups/keycloak
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_WEEKLY_RETENTION_WEEKS: ${BACKUP_WEEKLY_RETENTION_WEEKS:-4}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    depends_on:
      keycloak:
        condition: service_healthy
    restart: unless-stopped

  kong-dev:
    image: kong:latest
    user: "root"
    # host.docker.internal cho phép Kong trong Docker reach services chạy local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./kong/kong.dev.yaml:/usr/local/kong/declarative/kong.yaml
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - "8000:8000"
      - "8001:8001"

  # ── Observability (ELK Stack) ─────────────────────────────────────────────
  # Hybrid dev mode still needs ELK because services run local and send logs
  # to Logstash via localhost:5044 by default.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.3
    volumes:
      - ./docker/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.3
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ── Observability (Metrics) ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/prometheus/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    depends_on:
      - alertmanager
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "30000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  db_identity_data:
  db_user_data:
  db_exam_data:
  db_course_data:
  db_question_data:
  db_notification_data:
  db_analytics_data:
  db_simulation_data:
  db_media_data:
  db_audit_data:
  consul_data:
  db_keycloak_data:
  redis_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
